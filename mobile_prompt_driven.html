<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>机构经纪智能体 - 提示词驱动版</title>
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --success: #34c759;
            --warning: #ff9500;
            --danger: #ff3b30;
            --info: #007aff;
            --bg: #000000;
            --surface: #0d0d12;
            --card: #1a1a22;
            --card-hover: #22222c;
            --text: #ffffff;
            --text-secondary: rgba(255,255,255,0.65);
            --text-tertiary: rgba(255,255,255,0.4);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        
        .app { height: 100vh; display: flex; flex-direction: column; }
        
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        @keyframes typing { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        
        /* 顶部AI状态栏 */
        .ai-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        
        .ai-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            position: relative;
        }
        
        .ai-status-dot {
            position: absolute;
            bottom: 2px; right: 2px;
            width: 10px; height: 10px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid var(--primary);
            animation: pulse 2s infinite;
        }
        
        .ai-info { flex: 1; }
        .ai-name { font-size: 16px; font-weight: 600; }
        .ai-status { font-size: 12px; color: var(--text-tertiary); }
        
        .header-actions {
            display: flex;
            gap: 8px;
        }
        
        .icon-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--card);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .icon-btn:hover { background: var(--card-hover); }
        
        /* 对话区域 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        /* AI消息 */
        .message-ai {
            display: flex;
            gap: 10px;
            animation: slideUp 0.3s ease;
        }
        
        .message-ai .avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .message-ai .bubble {
            background: var(--card);
            border-radius: 18px;
            padding: 12px 16px;
            font-size: 15px;
            line-height: 1.6;
            max-width: 80%;
            border: 1px solid rgba(255,255,255,0.06);
        }
        
        /* 用户消息 */
        .message-user {
            display: flex;
            justify-content: flex-end;
            animation: slideUp 0.3s ease;
        }
        
        .message-user .bubble {
            background: var(--primary);
            border-radius: 18px;
            padding: 12px 16px;
            font-size: 15px;
            max-width: 80%;
        }
        
        /* 卡片消息 */
        .card-message {
            margin: 8px 0;
            animation: slideUp 0.4s ease;
        }
        
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.2s;
        }
        
        .card:hover { background: var(--card-hover); }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .card-avatar {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 600;
        }
        
        .card-title { font-size: 16px; font-weight: 600; }
        .card-subtitle { font-size: 13px; color: var(--text-tertiary); margin-top: 2px; }
        .card-body { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
        
        .card-tags {
            display: flex;
            gap: 8px;
            margin: 12px 0;
        }
        
        .tag {
            padding: 4px 10px;
            background: rgba(255,255,255,0.06);
            border-radius: 12px;
            font-size: 12px;
        }
        
        .tag.urgent { background: rgba(255,59,48,0.15); color: var(--danger); }
        .tag.warning { background: rgba(255,149,0,0.15); color: var(--warning); }
        .tag.success { background: rgba(52,199,89,0.15); color: var(--success); }
        .tag.primary { background: rgba(102,126,234,0.15); color: #a5b4fc; }
        
        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        
        .btn {
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: var(--text);
        }
        
        .btn:hover { transform: translateY(-2px); }
        
        /* 快捷选项 */
        .quick-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        
        .quick-btn {
            padding: 8px 14px;
            background: rgba(102,126,234,0.15);
            border: 1px solid rgba(102,126,234,0.3);
            border-radius: 16px;
            font-size: 13px;
            color: #a5b4fc;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quick-btn:hover { background: rgba(102,126,234,0.25); }
        
        /* 输入区域 */
        .input-area {
            padding: 12px 16px 24px;
            background: linear-gradient(180deg, transparent 0%, var(--bg) 20%);
        }
        
        .input-box {
            background: var(--card);
            border-radius: 24px;
            padding: 8px 8px 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        
        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 15px;
            outline: none;
        }
        
        .input-field::placeholder { color: var(--text-tertiary); }
        
        .input-action {
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .input-action.voice { background: rgba(255,255,255,0.06); }
        .input-action.send {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        }
        
        /* 快捷芯片 */
        .quick-chips {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0;
            scrollbar-width: none;
        }
        
        .quick-chips::-webkit-scrollbar { display: none; }
        
        .chip {
            padding: 6px 12px;
            background: var(--card);
            border-radius: 14px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.06);
        }
        
        .chip:hover { background: var(--card-hover); }
        
        /* 打字中 */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }
        
        .typing-dot {
            width: 8px; height: 8px;
            background: var(--text-tertiary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        /* 时间戳 */
        .timestamp {
            font-size: 11px;
            color: var(--text-tertiary);
            text-align: center;
            margin: 8px 0;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- AI状态栏 -->
        <div class="ai-header">
            <div class="ai-avatar">🦁<div class="ai-status-dot"></div></div>
            <div class="ai-info">
                <div class="ai-name">Kimi</div>
                <div class="ai-status">正在监控 12 位客户 · 3 个待办</div>
            </div>
            <div class="header-actions">
                <div class="icon-btn">🔍</div>
                <div class="icon-btn">⚙️</div>
            </div>
        </div>

        <!-- 对话区域 -->
        <div class="chat-area" id="chatArea">
            <div class="timestamp">今天 09:41</div>
            
            <!-- AI问候 -->
            <div class="message-ai">
                <div class="avatar">🦁</div>
                <div class="bubble">
                    早上好！今天有 <strong>3位客户</strong> 需要关注，还有 <strong style="color:var(--warning);">1个紧急事项</strong>。<br/><br/>
                    告诉我你想做什么，或者直接输入客户名称：
                </div>
            </div>
            
            <!-- 快捷选项 -->
            <div class="message-ai">
                <div class="avatar" style="visibility:hidden;"></div>
                <div class="quick-options">
                    <button class="quick-btn" onclick="sendQuick('看看今天有哪些客户')">👥 查看客户</button>
                    <button class="quick-btn" onclick="sendQuick('华泰资管什么状况')">⚠️ 紧急事项</button>
                    <button class="quick-btn" onclick="sendQuick('引入新客户')">➕ 引入客户</button>
                    <button class="quick-btn" onclick="sendQuick('今天的业绩数据')">📊 业绩看板</button>
                </div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
            <div class="quick-chips">
                <div class="chip" onclick="sendQuick('华夏理财')">华夏理财</div>
                <div class="chip" onclick="sendQuick('中银基金')">中银基金</div>
                <div class="chip" onclick="sendQuick('易方达')">易方达</div>
                <div class="chip" onclick="sendQuick('生成周报')">生成周报</div>
            </div>
            
            <div class="input-box">
                <input type="text" class="input-field" id="userInput" placeholder="输入你想做的..." onkeypress="handleKeyPress(event)">
                <div class="input-action voice" onclick="showToast('语音识别中...')">🎤</div>
                <div class="input-action send" onclick="sendMessage()">➤</div>
            </div>
        </div>
    </div>

    <script>
        // 模拟AI回复
        const aiResponses = {
            '华泰资管': {
                type: 'card',
                content: `
                    <div class="card-message">
                        <div class="message-ai">
                            <div class="avatar">🦁</div>
                            <div class="bubble">华泰资管当前状态：</div>
                        </div>
                        <div class="card" style="margin-left:42px;border-left:3px solid var(--danger);">
                            <div class="card-header">
                                <div class="card-avatar" style="background:linear-gradient(135deg,#ff6b6b,#ee5a6f);">华</div>
                                <div>
                                    <div class="card-title">华泰资管</div>
                                    <div class="card-subtitle">准入审核中 · 剩余2小时</div>
                                </div>
                            </div>
                            <div class="card-body"><strong style="color:var(--danger);">⚠️ 紧急：</strong>需补充法人身份证复印件、授权委托书</div>
                            <div class="card-tags"><span class="tag urgent">🔥 即将超时</span></div>
                            <div class="card-actions">
                                <button class="btn btn-primary" onclick="sendQuick('一键催办')">一键催办</button>
                                <button class="btn btn-secondary" onclick="sendQuick('查看详情')">查看详情</button>
                            </div>
                        </div>
                    </div>
                `
            },
            '华夏理财': {
                type: 'card',
                content: `
                    <div class="card-message">
                        <div class="message-ai">
                            <div class="avatar">🦁</div>
                            <div class="bubble">✓ 已识别客户「华夏理财」，正在创建档案...</div>
                        </div>
                        <div class="card" style="margin-left:42px;">
                            <div class="card-header">
                                <div class="card-avatar" style="background:linear-gradient(135deg,#60a5fa,#3b82f6);">华</div>
                                <div>
                                    <div class="card-title">华夏理财</div>
                                    <div class="card-subtitle">公募基金 · 潜在高价值客户</div>
                                </div>
                            </div>
                            <div class="card-tags"><span class="tag primary">🏦 公募基金</span><span class="tag">💰 预计5亿</span></div>
                            <div class="card-actions">
                                <button class="btn btn-primary" onclick="sendQuick('开始评估')">开始评估</button>
                                <button class="btn btn-secondary" onclick="sendQuick('补充信息')">补充信息</button>
                            </div>
                        </div>
                    </div>
                `
            },
            '一键催办': {
                type: 'text',
                content: '✓ 已发送催办通知给华泰资管联系人，预计10分钟内送达。我会在对方查看后提醒你。'
            },
            '开始评估': {
                type: 'text',
                content: '正在评估资质...'
            },
            '查看客户': {
                type: 'text',
                content: '你的客户列表：\n• 华泰资管 - 准入审核中（紧急）\n• 中银基金 - 已开户（1条预警）\n• 易方达投资 - 跟进中\n• 华夏理财 - 待评估\n\n输入客户名称查看详情。'
            },
            '引入客户': {
                type: 'text',
                content: '好的，我来帮你引入新客户。请告诉我客户名称，或者选择：\n\n[快捷选项] 导入邮件线索 | 扫描名片 | 语音输入'
            }
        };

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function sendQuick(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            // 添加用户消息
            addUserMessage(text);
            input.value = '';

            // 显示AI思考中
            showTyping();

            // 模拟AI回复
            setTimeout(() => {
                hideTyping();
                const response = findResponse(text);
                if (response) {
                    addAIMessage(response);
                } else {
                    addAIMessage({
                        type: 'text',
                        content: '收到。我可以帮你：\n• 查看客户状态\n• 引入新客户\n• 处理待办事项\n• 生成数据报表\n\n请告诉我具体想做什么。'
                    });
                }
            }, 800 + Math.random() * 500);
        }

        function findResponse(text) {
            for (let key in aiResponses) {
                if (text.toLowerCase().includes(key.toLowerCase())) {
                    return aiResponses[key];
                }
            }
            return null;
        }

        function addUserMessage(text) {
            const chat = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = 'message-user';
            div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function addAIMessage(response) {
            const chat = document.getElementById('chatArea');
            if (response.type === 'card') {
                chat.insertAdjacentHTML('beforeend', response.content);
            } else {
                const div = document.createElement('div');
                div.className = 'message-ai';
                div.innerHTML = `
                    <div class="avatar">🦁</div>
                    <div class="bubble">${response.content}</div>
                `;
                chat.appendChild(div);
            }
            chat.scrollTop = chat.scrollHeight;
        }

        function showTyping() {
            const chat = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = 'message-ai typing-indicator';
            div.id = 'typing';
            div.innerHTML = `
                <div class="avatar">🦁</div>
                <div class="bubble">
                    <div class="typing-indicator">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            `;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function hideTyping() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(msg) {
            // 简单的toast实现
            const toast = document.createElement('div');
            toast.style.cssText = `
                position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
                background:rgba(0,0,0,0.9);color:#fff;padding:16px 32px;
                border-radius:12px;z-index:9999;font-size:15px;
            `;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
</body>
</html>
