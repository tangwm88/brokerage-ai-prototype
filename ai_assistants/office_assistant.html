<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常办公助理 - 人机交互式工作台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: #f5f6f7;
            color: #1f2329;
            height: 100vh;
            overflow: hidden;
        }
        
        /* 顶部 */
        .header {
            background: linear-gradient(135deg, #00b42a 0%, #4ade80 100%);
            padding: 0 20px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            color: #fff;
        }
        .logo { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .header-center { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .status-dot { width: 8px; height: 8px; background: #fff; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .header-btn { background: rgba(255,255,255,0.2); border: none; padding: 6px 14px; border-radius: 6px; color: #fff; font-size: 13px; cursor: pointer; }
        
        /* 主体 */
        .main { display: flex; height: 100vh; padding-top: 56px; }
        
        /* 左侧栏 */
        .sidebar {
            width: 280px;
            background: #fff;
            border-right: 1px solid #e5e6eb;
            display: flex;
            flex-direction: column;
            padding: 16px;
        }
        .new-chat-btn {
            background: linear-gradient(135deg, #00b42a, #4ade80);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 16px;
        }
        .sidebar-section { margin-top: 20px; }
        .sidebar-title { font-size: 12px; color: #86909c; margin-bottom: 8px; padding-left: 8px; }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #4e5969;
            margin-bottom: 4px;
        }
        .chat-item:hover, .chat-item.active { background: #f2f3f5; }
        .chat-item.active { color: #00b42a; font-weight: 500; }
        
        /* 中间聊天区 */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }
        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e5e6eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-title { font-size: 16px; font-weight: 600; }
        .chat-subtitle { font-size: 13px; color: #86909c; margin-top: 4px; }
        .chat-actions { display: flex; gap: 8px; }
        .action-btn { background: #f2f3f5; border: none; padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .action-btn.primary { background: #00b42a; color: #fff; }
        
        .messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { display: flex; gap: 12px; margin-bottom: 20px; }
        .message-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .message.ai .message-avatar { background: linear-gradient(135deg, #00b42a, #4ade80); }
        .message-content { max-width: 70%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
        .message.ai .message-content { background: #f2f3f5; color: #1f2329; }
        
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #e5e6eb;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .input-box {
            flex: 1;
            background: #f2f3f5;
            border: none;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
        }
        .send-btn { background: #00b42a; color: #fff; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        /* 右侧信息栏 */
        .info-panel {
            width: 320px;
            background: #fafbfc;
            border-left: 1px solid #e5e6eb;
            padding: 20px;
            overflow-y: auto;
        }
        .info-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
        .feature-card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .feature-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .feature-desc { font-size: 13px; color: #86909c; line-height: 1.5; }
        .quick-action { display: flex; gap: 8px; margin-top: 12px; }
        .quick-btn { flex: 1; background: #f2f3f5; border: none; padding: 8px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <span>📋</span>
            <span>日常办公助理</span>
        </div>
        <div class="header-center">
            <span class="status-dot"></span>
            <span>助理在线 · 随时为您服务</span>
        </div>
        <div class="header-right">
            <button class="header-btn">⚙️ 设置</button>
            <button class="header-btn">👤 个人中心</button>
        </div>
    </div>
    
    <div class="main">
        <!-- 左侧栏 -->
        <div class="sidebar">
            <button class="new-chat-btn">
                <span>+</span>
                <span>新建会话</span>
            </button>
            
            <div class="sidebar-section">
                <div class="sidebar-title">今日会话</div>
                <div class="chat-item active">
                    <span>📝</span>
                    <span>会议纪要整理</span>
                </div>
                <div class="chat-item">
                    <span>📧</span>
                    <span>客户邮件回复</span>
                </div>
            </div>
            
            <div class="sidebar-section">
                <div class="sidebar-title">历史记录</div>
                <div class="chat-item">
                    <span>✓</span>
                    <span>周报撰写</span>
                </div>
                <div class="chat-item">
                    <span>✓</span>
                    <span>会议安排</span>
                </div>
            </div>
        </div>
        
        <!-- 中间聊天区 -->
        <div class="chat-area">
            <div class="chat-header">
                <div>
                    <div class="chat-title">📝 会议纪要整理</div>
                    <div class="chat-subtitle">快速整理会议要点，生成结构化纪要</div>
                </div>
            </div>
            
            <div class="messages">
                <!-- AI消息 -->
                <div class="message ai">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        您好！我是您的日常办公助理。我可以帮您：<br><br>
                        📅 <strong>日程管理</strong> - 安排会议、设置提醒<br>
                        📝 <strong>文档起草</strong> - 撰写邮件、报告、纪要<br>
                        📧 <strong>邮件撰写</strong> - 专业商务邮件模板<br>
                        🔍 <strong>信息查询</strong> - 快速检索所需信息<br><br>
                        有什么我可以帮您的吗？
                    </div>
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" class="input-box" placeholder="输入您的问题或需求...">
                <button class="send-btn">➤</button>
            </div>
        </div>
        
        <!-- 右侧信息栏 -->
        <div class="info-panel">
            <div class="info-title">🚀 快捷功能</div>
            
            <div class="feature-card">
                <div class="feature-title">📅 日程管理</div>
                <div class="feature-desc">智能安排日程，冲突检测，提醒设置</div>
                <div class="quick-action">
                    <button class="quick-btn">新建日程</button>
                    <button class="quick-btn">查看日历</button>
                </div>
            </div>
            
            <div class="feature-card">
                <div class="feature-title">📝 文档起草</div>
                <div class="feature-desc">会议纪要、工作报告、通知公告一键生成</div>
                <div class="quick-action">
                    <button class="quick-btn">会议纪要</button>
                    <button class="quick-btn">周报</button>
                </div>
            </div>
            
            <div class="feature-card">
                <div class="feature-title">📧 邮件助手</div>
                <div class="feature-desc">商务邮件模板，语气调整，格式优化</div>
                <div class="quick-action">
                    <button class="quick-btn">撰写邮件</button>
                    <button class="quick-btn">邮件优化</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
