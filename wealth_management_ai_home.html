<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XX证券AI - 您的投资伙伴</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            box-sizing: border-box;
        }
        
        body {
            background: #f8fafc;
            padding-bottom: 100px;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .gradient-hero {
            background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 50%, #581c87 100%);
        }
        
        .gradient-card-1 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        .gradient-card-2 {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        .gradient-card-3 {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        
        .nav-item.active {
            color: #1e40af;
        }
        
        .nav-item.active svg {
            stroke: #1e40af;
        }
        
        @keyframes pulse-ring {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        .ai-button-pulse {
            animation: pulse-ring 2s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }
        
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        
        .smart-card {
            transition: all 0.3s ease;
        }
        
        .smart-card:active {
            transform: scale(0.98);
        }
        
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .wave-bar {
            animation: wave 1s ease-in-out infinite;
        }
        
        @keyframes wave {
            0%, 100% { height: 4px; }
            50% { height: 20px; }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-md mx-auto bg-gray-50 min-h-screen relative">
        
        <!-- 顶部AI问候栏 -->
        <div class="sticky top-0 z-40 px-4 py-3 bg-white shadow-sm">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-full gradient-hero flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                    <div>
                        <div class="text-xs text-gray-400">下午好</div>
                        <div class="text-sm font-semibold text-gray-800">王先生</div>
                    </div>
                </div>
                
                <div class="flex items-center space-x-3">
                    <button class="relative p-2 rounded-full hover:bg-gray-100">
                        <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                        <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 主内容区 -->
        <div class="px-4 pt-4 space-y-4">
            
            <!-- AI意图输入框 -->
            <div class="bg-white rounded-2xl p-4 shadow-sm">
                <div class="relative">
                    <input type="text" 
                           id="aiInput"
                           placeholder="今天想看什么？" 
                           class="w-full bg-gray-50 rounded-xl px-4 py-3 pr-12 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                           onkeypress="handleAIInput(event)">
                    
                    <button class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full gradient-hero flex items-center justify-center text-white">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
                        </svg>
                    </button>
                </div>
                
                <!-- 快捷意图 -->
                <div class="flex flex-wrap gap-2 mt-3">
                    <button onclick="quickAsk('查看我的持仓')" class="px-3 py-1.5 bg-indigo-50 text-indigo-600 rounded-full text-xs font-medium">📊 查看持仓</button>
                    <button onclick="quickAsk('今天市场行情')" class="px-3 py-1.5 bg-green-50 text-green-600 rounded-full text-xs font-medium">📈 今日行情</button>
                    <button onclick="quickAsk('帮我配置资产')" class="px-3 py-1.5 bg-purple-50 text-purple-600 rounded-full text-xs font-medium">🎯 资产配置</button>
                    <button onclick="quickAsk('推荐一支股票')" class="px-3 py-1.5 bg-orange-50 text-orange-600 rounded-full text-xs font-medium">💡 智能推荐</button>
                </div>
            </div>
            
            <!-- AI主动提示 -->
            <div class="bg-gradient-to-r from-amber-500 to-orange-500 rounded-2xl p-4 text-white">
                <div class="flex items-start space-x-3">
                    <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center flex-shrink-0">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </div>
                    <div class="flex-1">
                        <div class="font-semibold mb-1">⚠️ 持仓预警</div>
                        <p class="text-sm text-white/90">您持有的宁德时代今日跌幅超5%，建议关注</p>
                        <div class="flex space-x-2 mt-3">
                            <button class="px-3 py-1.5 bg-white/20 rounded-lg text-xs">查看原因</button>
                            <button class="px-3 py-1.5 bg-white text-orange-500 rounded-lg text-xs font-medium">一键调仓</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 智能卡片流 -->
            <div class="space-y-3">
                <!-- 卡片1: AI投顾 -->
                <div class="smart-card bg-gradient-to-r from-indigo-500 to-purple-500 rounded-2xl p-4 text-white">
                    <div class="flex items-center space-x-2 mb-3">
                        <span class="text-xl">🤖</span>
                        <span class="font-semibold">AI投顾 · 早盘必读</span>
                    </div>
                    
                    <p class="text-sm text-white/90 leading-relaxed mb-3">
                        今日3条与您持仓相关的消息：新能源补贴政策延续、美联储利率决议今晚公布、半导体板块资金净流入第一
                    </p>
                    
                    <div class="flex space-x-2">
                        <button class="px-3 py-1.5 bg-white/20 rounded-lg text-xs">深度解读</button>
                        <button class="px-3 py-1.5 bg-white/20 rounded-lg text-xs">调整策略</button>
                    </div>
                </div>
                
                <!-- 卡片2: 资产配置 -->
                <div class="smart-card bg-white rounded-2xl p-4 shadow-sm">
                    <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center space-x-2">
                            <span class="text-xl">💎</span>
                            <span class="font-semibold text-gray-800">资产配置诊断</span>
                        </div>
                        <span class="text-2xl font-bold text-green-500">78分</span>
                    </div>
                    
                    <div class="space-y-2">
                        <div>
                            <div class="flex justify-between text-xs text-gray-500 mb-1">
                                <span>权益类</span>
                                <span class="text-red-500">65% 偏高</span>
                            </div>
                            <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
                                <div class="h-full bg-red-400 rounded-full" style="width: 65%"></div>
                            </div>
                        </div>
                        
                        <div>
                            <div class="flex justify-between text-xs text-gray-500 mb-1">
                                <span>固收类</span>
                                <span class="text-yellow-500">20% 偏低</span>
                            </div>
                            <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
                                <div class="h-full bg-yellow-400 rounded-full" style="width: 20%"></div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex space-x-2 mt-3">
                        <button class="flex-1 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium">查看详情</button>
                        <button class="flex-1 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm">一键调仓</button>
                    </div>
                </div>
                
                <!-- 卡片3: 交易机会 -->
                <div class="smart-card bg-gradient-to-r from-orange-400 to-pink-500 rounded-2xl p-4 text-white">
                    <div class="flex items-center space-x-2 mb-3">
                        <span class="text-xl">🔥</span>
                        <span class="font-semibold">交易机会</span>
                    </div>
                    
                    <p class="text-sm text-white/90 mb-3">您关注的半导体板块出现异动，中芯国际涨幅超8%</p>
                    
                    <div class="flex space-x-2">
                        <button class="px-3 py-1.5 bg-white/20 rounded-lg text-xs">查看标的</button>
                        <button class="px-3 py-1.5 bg-white text-orange-500 rounded-lg text-xs font-medium">设置提醒</button>
                    </div>
                </div>
                
                <!-- 卡片4: 快捷交易 -->
                <div class="smart-card bg-white rounded-2xl p-4 shadow-sm">
                    <div class="flex items-center space-x-2 mb-3">
                        <span class="text-xl">💰</span>
                        <span class="font-semibold text-gray-800">快捷交易</span>
                    </div>
                    
                    <p class="text-sm text-gray-500 mb-3">最近关注：宁德时代、比亚迪、中芯国际</p>
                    
                    <div class="flex space-x-2">
                        <button class="flex-1 py-2 bg-red-500 text-white rounded-lg text-sm font-medium">买入宁德</button>
                        <button class="flex-1 py-2 bg-green-500 text-white rounded-lg text-sm font-medium">卖出隆基</button>
                    </div>
                </div>
            </div>
            
        </div>
        
        <!-- 底部导航栏 -->
        <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 max-w-md mx-auto z-40">
            <div class="flex items-center justify-around py-2 px-2">
                <button class="nav-item active flex flex-col items-center py-1 px-3">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
                    </svg>
                    <span class="text-xs mt-0.5">AI</span>
                </button>
                
                <button class="nav-item flex flex-col items-center py-1 px-3 text-gray-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                    <span class="text-xs mt-0.5">行情</span>
                </button>
                
                <!-- 中间AI按钮 -->
                <button class="flex flex-col items-center -mt-4">
                    <div class="w-14 h-14 rounded-full gradient-hero flex items-center justify-center shadow-lg ai-button-pulse border-4 border-white">
                        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                </button>
                
                <button class="nav-item flex flex-col items-center py-1 px-3 text-gray-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                    </svg>
                    <span class="text-xs mt-0.5">交易</span>
                </button>
                
                <button class="nav-item flex flex-col items-center py-1 px-3 text-gray-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <span class="text-xs mt-0.5">我的</span>
                </button>
            </div>
            <div class="h-safe-area-inset-bottom"></div>
        </div>
        
        <!-- AI全屏对话界面 -->
        <div id="aiChatModal" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-gray-900">
                <!-- 头部 -->
                <div class="px-4 py-3 bg-gray-800 flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 rounded-full gradient-hero flex items-center justify-center">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                            </svg>
                        </div>
                        <div>
                            <div class="text-white font-medium">AI投资伙伴</div>
                            <div class="text-xs text-green-400">● 在线</div>
                        </div>
                    </div>
                    
                    <button onclick="toggleAIChat()" class="p-2 text-white/70">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                
                <!-- 聊天内容 -->
                <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4" style="height: calc(100vh - 140px);">
                    <!-- 欢迎消息 -->
                    <div class="flex items-start space-x-3">
                        <div class="w-10 h-10 rounded-full gradient-hero flex items-center justify-center flex-shrink-0">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                            </svg>
                        </div>
                        <div class="bg-gray-800 rounded-2xl rounded-tl-none px-4 py-3 max-w-[80%]">
                            <p class="text-white text-sm">下午好，王先生！我是您的AI投资伙伴。今天市场开盘了，需要我帮您看看持仓情况吗？</p>
                        </div>
                    </div>
                </div>
                
                <!-- 输入区 -->
                <div class="absolute bottom-0 left-0 right-0 p-4 bg-gray-800">
                    <div class="flex items-center space-x-2">
                        <button class="p-2 text-white/50">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
                            </svg>
                        </button>
                        
                        <input type="text" 
                               id="chatInput"
                               placeholder="输入您的问题..." 
                               class="flex-1 bg-gray-700 rounded-full px-4 py-2 text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                               onkeypress="handleChatInput(event)">
                        
                        <button onclick="sendMessage()" class="p-2 gradient-hero rounded-full">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
    </div>

    <script>
        // 快捷提问
        function quickAsk(question) {
            document.getElementById('aiInput').value = question;
            // 模拟AI回复
            showToast(`AI正在思考：${question}...`);
            setTimeout(() => {
                showToast('💡 AI已为您生成分析报告');
            }, 1500);
        }
        
        // AI输入处理
        function handleAIInput(event) {
            if (event.key === 'Enter') {
                const value = event.target.value;
                if (value.trim()) {
                    showToast(`🤖 AI正在分析：${value}...`);
                    event.target.value = '';
                }
            }
        }
        
        // 切换AI聊天
        function toggleAIChat() {
            const modal = document.getElementById('aiChatModal');
            modal.classList.toggle('hidden');
        }
        
        // 聊天输入
        function handleChatInput(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // 发送消息
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (message) {
                addMessage('user', message);
                input.value = '';
                
                setTimeout(() => {
                    const responses = [
                        '已为您找到相关信息，正在整理中...',
                        '这是一个很好的问题，让我为您分析一下...',
                        '根据您的持仓情况，我建议...'
                    ];
                    addMessage('ai', responses[Math.floor(Math.random() * responses.length)]);
                }, 1000);
            }
        }
        
        // 添加消息
        function addMessage(type, text) {
            const container = document.getElementById('chatMessages');
            const isUser = type === 'user';
            
            const html = `
                <div class="flex items-start space-x-3 ${isUser ? 'flex-row-reverse space-x-reverse' : ''}">
                    ${!isUser ? `
                        <div class="w-10 h-10 rounded-full gradient-hero flex items-center justify-center flex-shrink-0">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                            </svg>
                        </div>
                    ` : `
                        <div class="w-10 h-10 rounded-full bg-gray-600 flex items-center justify-center text-white font-bold">王</div>
                    `}
                    <div class="${isUser ? 'bg-indigo-600' : 'bg-gray-800'} rounded-2xl ${isUser ? 'rounded-tr-none' : 'rounded-tl-none'} px-4 py-3 max-w-[80%]">
                        <p class="text-white text-sm">${text}</p>
                    </div>
                </div>
            `;
            
            container.insertAdjacentHTML('beforeend', html);
            container.scrollTop = container.scrollHeight;
        }
        
        // Toast提示
        function showToast(message) {
            const existing = document.querySelector('.toast-message');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast-message fixed top-20 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full text-sm z-50 shadow-lg';
            toast.innerHTML = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
