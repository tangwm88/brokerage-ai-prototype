<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>机构经纪智能体</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #000000;
            --surface: #0a0a0f;
            --card: #15151a;
            --border: rgba(255,255,255,0.06);
            --text: #ffffff;
            --text-secondary: rgba(255,255,255,0.6);
            --primary: #19c37d;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        
        .app { height: 100vh; display: flex; flex-direction: column; }
        
        /* 极简顶部 */
        .top-bar {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        
        .brand { font-size: 16px; font-weight: 600; }
        
        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .status-dot {
            width: 6px; height: 6px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        /* 聊天区域 - 核心 */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 100px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        /* 消息气泡 */
        .message {
            max-width: 90%;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .message-user {
            align-self: flex-end;
            background: var(--card);
            padding: 12px 16px;
            border-radius: 20px 20px 4px 20px;
            font-size: 15px;
            line-height: 1.5;
        }
        
        .message-ai {
            display: flex;
            gap: 12px;
        }
        
        .ai-icon {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .ai-content {
            flex: 1;
            font-size: 15px;
            line-height: 1.7;
            color: var(--text);
        }
        
        /* 卡片 - 嵌入在消息中 */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
        }
        
        .card:hover { border-color: rgba(255,255,255,0.12); }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .card-avatar {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
        }
        
        .card-title { font-size: 15px; font-weight: 600; }
        .card-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .card-body { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin: 12px 0; }
        
        .card-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-primary { background: var(--primary); color: #000; font-weight: 500; }
        .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text); }
        .btn:hover { opacity: 0.9; }
        
        /* 标签 */
        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 6px;
        }
        
        .tag-urgent { background: rgba(239,68,68,0.15); color: var(--danger); }
        .tag-warning { background: rgba(245,158,11,0.15); color: var(--warning); }
        .tag-success { background: rgba(25,195,125,0.15); color: var(--primary); }
        
        /* 输入区 */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 16px 24px;
            background: linear-gradient(180deg, transparent 0%, var(--bg) 30%);
        }
        
        .input-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 4px 4px 4px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .input-box:focus-within { border-color: rgba(255,255,255,0.15); }
        
        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 15px;
            outline: none;
            padding: 10px 0;
        }
        
        .input-field::placeholder { color: var(--text-secondary); }
        
        .input-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 18px;
        }
        
        .input-btn.send {
            background: var(--primary);
            color: #000;
        }
        
        /* 流式输出光标 */
        .cursor {
            display: inline-block;
            width: 8px; height: 18px;
            background: var(--primary);
            margin-left: 2px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        /* 建议芯片 */
        .suggestions {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0;
            margin-top: 8px;
            scrollbar-width: none;
        }
        
        .suggestions::-webkit-scrollbar { display: none; }
        
        .chip {
            padding: 6px 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .chip:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <div class="brand">🦁 机构经纪智能体</div>
            <div class="status">
                <div class="status-dot"></div>
                <span>在线</span>
            </div>
        </div>

        <div class="chat" id="chat">
            <!-- 初始欢迎 -->
        </div>

        <div class="input-area">
            <div class="suggestions" id="suggestions">
                <div class="chip" onclick="send('看看今天有什么任务')">看看今天有什么任务</div>
                <div class="chip" onclick="send('华泰资管什么状况')">华泰资管什么状况</div>
                <div class="chip" onclick="send('华夏理财')">华夏理财</div>
            </div>
            
            <div class="input-box">
                <input type="text" class="input-field" id="input" placeholder="输入任何你想做的..." onkeypress="if(event.key==='Enter')send()">
                <div class="input-btn send" onclick="send()">↑</div>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const suggestions = document.getElementById('suggestions');

        // 初始欢迎
        window.onload = () => {
            setTimeout(() => {
                typeWriter(`早上好！我是你的机构经纪智能助手。

我可以帮你：
• 管理客户关系，跟踪业务进展
• 处理待办事项，预警风险
• 生成报告，分析数据

有什么我可以帮你的吗？`, () => {
                    updateSuggestions(['👥 查看我的客户', '⚠️ 有什么紧急事项', '➕ 引入新客户', '📊 今天的业绩']);
                });
            }, 300);
        };

        function send(text) {
            const msg = text || input.value.trim();
            if (!msg) return;

            // 用户消息
            addUserMessage(msg);
            input.value = '';

            // 处理响应
            processAIResponse(msg);
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message message-user';
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function addAIMessage(html, callback) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message message-ai';
            wrapper.innerHTML = `
                <div class="ai-icon">🦁</div>
                <div class="ai-content">${html}</div>
            `;
            chat.appendChild(wrapper);
            chat.scrollTop = chat.scrollHeight;
            if (callback) callback();
        }

        function typeWriter(text, callback) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message message-ai';
            wrapper.innerHTML = `
                <div class="ai-icon">🦁</div>
                <div class="ai-content"><span id="typing-text"></span><span class="cursor"></span></div>
            `;
            chat.appendChild(wrapper);
            chat.scrollTop = chat.scrollHeight;

            const span = wrapper.querySelector('#typing-text');
            let i = 0;
            const type = () => {
                if (i < text.length) {
                    span.textContent += text.charAt(i);
                    i++;
                    chat.scrollTop = chat.scrollHeight;
                    setTimeout(type, 20 + Math.random() * 30);
                } else {
                    wrapper.querySelector('.cursor').remove();
                    if (callback) callback();
                }
            };
            type();
        }

        function processAIResponse(userMsg) {
            const msg = userMsg.toLowerCase();
            
            if (msg.includes('客户') || msg.includes('看看')) {
                setTimeout(() => {
                    typeWriter(`你当前有 4 位客户需要关注：`, () => {
                        addCard({
                            avatar: '🔴',
                            color: '#ef4444',
                            title: '华泰资管',
                            subtitle: '准入审核中',
                            body: '⚠️ 紧急：资料补充即将超时（剩余2小时）\n需补充：法人身份证、授权委托书',
                            tags: [<span class="tag tag-urgent">紧急</span>],
                            actions: ['一键催办', '查看详情']
                        });
                        
                        setTimeout(() => {
                            addCard({
                                avatar: '🟡',
                                color: '#f59e0b',
                                title: '中银基金',
                                subtitle: '已开户 · 持仓2.3亿',
                                body: '有 1 条舆情预警需要关注',
                                tags: [<span class="tag tag-warning">舆情预警</span>],
                                actions: ['查看预警', '联系客户']
                            });
                            updateSuggestions(['🔴 处理华泰资管', '🟡 查看中银基金舆情', '➕ 引入新客户']);
                        }, 800);
                    });
                }, 500);
            }
            else if (msg.includes('华泰') || msg.includes('紧急')) {
                setTimeout(() => {
                    typeWriter(`华泰资管当前状态：`, () => {
                        addCard({
                            avatar: '华',
                            color: '#ef4444',
                            title: '华泰资管',
                            subtitle: '准入审核中 · 剩余2小时',
                            body: '⚠️ 资料补充即将超时\n\n缺失材料：\n• 法人身份证复印件\n• 授权委托书\n• 风险测评问卷',
                            tags: [<span class="tag tag-urgent">即将超时</span>],
                            actions: ['✓ 一键催办', '查看清单', '延后提醒']
                        });
                        updateSuggestions(['✓ 一键催办', '查看资料清单', '联系客户']);
                    });
                }, 500);
            }
            else if (msg.includes('华夏')) {
                setTimeout(() => {
                    typeWriter(`✓ 已识别新客户「华夏理财」\n正在创建客户档案...`, () => {
                        setTimeout(() => {
                            addCard({
                                avatar: '华',
                                color: '#3b82f6',
                                title: '华夏理财',
                                subtitle: '公募基金 · 潜在客户',
                                body: '📊 AI评估：高价值客户\n预计规模：3-5亿\n联系人：张总\n需求：股票交易、算法交易',
                                tags: [<span class="tag tag-success">高价值</span>, <span class="tag">公募基金</span>],
                                actions: ['开始资质评估', '补充信息', '分配给张经理']
                            });
                            updateSuggestions(['开始资质评估', '分配给张经理', '添加到日程']);
                        }, 600);
                    });
                }, 500);
            }
            else if (msg.includes('催办') || msg.includes('处理')) {
                setTimeout(() => {
                    typeWriter(`✓ 已发送催办通知\n\n已通知华泰资管联系人（王经理）\n预计10分钟内送达\n\n我会在对方查看后第一时间提醒你。`);
                    updateSuggestions(['👥 查看其他客户', '📊 今天的业绩', '➕ 引入新客户']);
                }, 600);
            }
            else {
                setTimeout(() => {
                    typeWriter(`收到。我可以帮你：

• **客户管理** - 查看状态、跟进提醒
• **业务办理** - 引入客户、账户开立
• **风险监控** - 舆情预警、合规检查
• **数据分析** - 业绩报表、趋势分析

告诉我具体想做什么，或者输入客户名称。`);
                    updateSuggestions(['👥 查看客户', '⚠️ 紧急事项', '📊 业绩报表']);
                }, 500);
            }
        }

        function addCard(data) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="card-avatar" style="background:${data.color}20;color:${data.color};">${data.avatar}</div>
                    <div>
                        <div class="card-title">${data.title}</div>
                        <div class="card-subtitle">${data.subtitle}</div>
                    </div>
                </div>
                <div class="card-body">${data.body}</div>
                <div style="margin-bottom:12px;">${data.tags.join('')}</div>
                <div class="card-actions">
                    ${data.actions.map(a => `<button class="btn ${a.includes('✓') ? 'btn-primary' : 'btn-secondary'}" onclick="send('${a.replace('✓ ', '')}')">${a}</button>`).join('')}
                </div>
            `;
            
            const lastMsg = chat.lastElementChild;
            if (lastMsg && lastMsg.classList.contains('message-ai')) {
                lastMsg.querySelector('.ai-content').appendChild(card);
            } else {
                addAIMessage(card.outerHTML);
            }
            chat.scrollTop = chat.scrollHeight;
        }

        function updateSuggestions(list) {
            suggestions.innerHTML = list.map(s => `<div class="chip" onclick="send('${s.replace(/🔴|🟡|➕|👥|⚠️|📊|✓/g, '').trim()}')">${s}</div>`).join('');
        }
    </script>
</body>
</html>
