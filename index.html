<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>机构经纪智能体</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --card: #ffffff;
            --border: rgba(0,0,0,0.08);
            --text: #1d1d1f;
            --text-secondary: rgba(0,0,0,0.5);
            --primary: #007aff;
            --warning: #ff9500;
            --danger: #ff3b30;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        
        .app { height: 100vh; display: flex; flex-direction: column; }
        
        .top-bar {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        
        .brand { font-size: 16px; font-weight: 600; }
        .status { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
        .status-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message { max-width: 92%; animation: fadeIn 0.3s ease; }
        
        .message-user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            padding: 12px 16px;
            border-radius: 20px 20px 4px 20px;
            font-size: 15px;
            line-height: 1.5;
        }
        
        .message-ai { display: flex; gap: 10px; }
        
        .ai-icon {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
        }
        
        .ai-content { flex: 1; font-size: 15px; line-height: 1.7; }
        
        /* 业务导航网格 - 核心 */
        .biz-nav {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin: 8px 0;
        }
        
        .nav-title {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 500;
        }
        
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .nav-item {
            background: rgba(0,0,0,0.03);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            text-align: center;
        }
        
        .nav-item:hover {
            background: rgba(0,0,0,0.06);
            border-color: rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        
        .nav-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .nav-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .nav-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        /* 分类详情面板 */
        .category-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin: 8px 0;
        }
        
        .panel-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .panel-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        
        .panel-title { font-size: 16px; font-weight: 600; }
        
        /* 子分类列表 */
        .subcategory-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .sub-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: rgba(0,0,0,0.02);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .sub-item:hover {
            background: rgba(0,0,0,0.04);
            border-color: var(--primary);
        }
        
        .sub-icon {
            width: 36px; height: 36px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            background: rgba(0,0,0,0.05);
        }
        
        .sub-info { flex: 1; }
        .sub-name { font-size: 14px; font-weight: 500; }
        .sub-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .sub-arrow { font-size: 18px; color: var(--text-secondary); }
        
        /* 业务卡片 */
        .biz-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            margin: 10px 0;
        }
        
        .biz-card.urgent { border-left: 3px solid var(--danger); }
        .biz-card.warning { border-left: 3px solid var(--warning); }
        
        .biz-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 12px;
        }
        
        .biz-avatar {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 600;
        }
        
        .biz-title { font-size: 15px; font-weight: 600; }
        .biz-subtitle { font-size: 12px; color: var(--text-secondary); }
        .biz-body { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin: 12px 0; }
        
        .biz-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-secondary { background: rgba(0,0,0,0.06); color: var(--text); }
        
        .tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 4px;
        }
        
        .tag-urgent { background: rgba(255,59,48,0.1); color: var(--danger); }
        .tag-warning { background: rgba(255,149,0,0.1); color: var(--warning); }
        
        /* 输入区 */
        .input-area {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 12px 16px 24px;
            background: linear-gradient(180deg, transparent 0%, var(--bg) 30%);
        }
        
        .suggestions {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0;
            scrollbar-width: none;
        }
        
        .suggestions::-webkit-scrollbar { display: none; }
        
        .chip {
            padding: 6px 12px;
            background: rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
        }
        
        .chip:hover { background: rgba(0,0,0,0.1); }
        
        .input-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 4px 4px 4px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        
        .input-box:focus-within { border-color: rgba(0,0,0,0.2); }
        
        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 15px;
            outline: none;
            padding: 10px 0;
        }
        
        .input-field::placeholder { color: var(--text-secondary); }
        
        .input-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 18px;
        }
        
        .input-btn.send { background: var(--primary); color: #fff; }
        
        .cursor {
            display: inline-block;
            width: 8px; height: 18px;
            background: var(--primary);
            margin-left: 2px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <div class="brand">🦁 机构经纪智能体</div>
            <div class="status"><div class="status-dot"></div><span>在线</span></div>
        </div>

        <div class="chat" id="chat"></div>

        <div class="input-area">
            <div class="suggestions" id="suggestions"></div>
            <div class="input-box">
                <input type="text" class="input-field" id="input" placeholder="输入业务关键词或直接点击上方分类..." onkeypress="if(event.key==='Enter')send()">
                <div class="input-btn send" onclick="send()">↑</div>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const suggestions = document.getElementById('suggestions');

        // 业务分类数据 - 完整版
        const businessCategories = {
            '引入客户': {
                icon: '👤',
                color: '#3b82f6',
                desc: '客户开发、线索管理',
                subcategories: [
                    { name: '线索收集', desc: '从邮件、名片、活动收集客户线索', icon: '📧' },
                    { name: '资质初筛', desc: 'AI评估客户资质、匹配度', icon: '⚡' },
                    { name: '客户画像', desc: '完善客户信息、需求分析', icon: '🎨' },
                    { name: '分配跟进', desc: '分配给客户经理、设置提醒', icon: '📋' }
                ]
            },
            '账户开立': {
                icon: '📝',
                color: '#8b5cf6',
                desc: '开户审核、协议签署',
                subcategories: [
                    { name: '准入审核', desc: '资料完整性、合规性审核', icon: '✓' },
                    { name: '协议生成', desc: '自动生成开户协议、风险揭示书', icon: '📄' },
                    { name: '权限配置', desc: '交易权限、额度设置', icon: '🔐' },
                    { name: '账户激活', desc: '开通通知、使用指导', icon: '▶️' }
                ]
            },
            '交易服务': {
                icon: '💰',
                color: '#10b981',
                desc: '算法交易、订单执行',
                subcategories: [
                    { name: '算法配置', desc: 'TWAP、VWAP算法参数设置', icon: '⚙️' },
                    { name: '订单执行', desc: '订单监控、执行反馈', icon: '📊' },
                    { name: '异常预警', desc: '价格异动、成交异常监控', icon: '🚨' },
                    { name: '成交反馈', desc: '实时成交报告、分析', icon: '📈' }
                ]
            },
            '客户服务': {
                icon: '🎧',
                color: '#f59e0b',
                desc: '客户维护、风险监控',
                subcategories: [
                    { name: '咨询响应', desc: '解答客户业务咨询', icon: '💬' },
                    { name: '对账服务', desc: '生成对账单、差异处理', icon: '📑' },
                    { name: '舆情跟踪', desc: '监控客户主体舆情动态', icon: '📰' },
                    { name: '监管关联', desc: '监管问询、处罚预警', icon: '🏛️' },
                    { name: '风险预警', desc: '综合风险评分、分级预警', icon: '⚠️' },
                    { name: '满意度管理', desc: '定期调研、反馈收集', icon: '😊' }
                ]
            }
        };

        // 今日任务数据
        const todayTasks = {
            '引入客户': { total: 4, urgent: 1 },
            '账户开立': { total: 3, urgent: 0 },
            '交易服务': { total: 5, urgent: 0 },
            '客户服务': { total: 6, urgent: 1 }
        };

        // 初始欢迎 + 业务导航
        window.onload = () => {
            setTimeout(() => {
                typeWriter(`你好！我是你的机构经纪助手。

我可以帮你处理以下业务，点击或输入关键词即可开始：`, () => {
                    addBusinessNav();
                    updateSuggestions(['👤 引入客户', '📝 账户开立', '💰 交易服务', '🎧 客户服务']);
                });
            }, 300);
        };

        function typeWriter(text, callback) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message message-ai';
            wrapper.innerHTML = `
                <div class="ai-icon">🦁</div>
                <div class="ai-content"><span id="typing-text"></span><span class="cursor"></span></div>
            `;
            chat.appendChild(wrapper);
            chat.scrollTop = chat.scrollHeight;

            const span = wrapper.querySelector('#typing-text');
            let i = 0;
            const type = () => {
                if (i < text.length) {
                    span.textContent += text.charAt(i);
                    i++;
                    chat.scrollTop = chat.scrollHeight;
                    setTimeout(type, 15 + Math.random() * 20);
                } else {
                    wrapper.querySelector('.cursor').remove();
                    if (callback) callback();
                }
            };
            type();
        }

        // 添加业务导航网格
        function addBusinessNav() {
            const navHtml = `
                <div class="biz-nav">
                    <div class="nav-title">🎯 业务目标分类（点击选择）</div>
                    <div class="nav-grid">
                        ${Object.entries(businessCategories).map(([name, data]) => {
                            const task = todayTasks[name];
                            return `
                                <div class="nav-item" onclick="selectCategory('${name}')" style="border-left:3px solid ${data.color};">
                                    <div class="nav-icon">${data.icon}</div>
                                    <div class="nav-name">${name}</div>
                                    <div class="nav-desc">${data.desc}</div>
                                    ${task.urgent > 0 ? `<div style="margin-top:6px;font-size:12px;color:#ff3b30;">🔴 ${task.urgent} 紧急 · ${task.total} 项</div>` : `<div style="margin-top:6px;font-size:12px;color:var(--text-secondary);">${task.total} 项待办</div>`}
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
            
            const lastMsg = chat.lastElementChild;
            if (lastMsg) {
                lastMsg.querySelector('.ai-content').insertAdjacentHTML('beforeend', navHtml);
            }
            chat.scrollTop = chat.scrollHeight;
        }

        function selectCategory(categoryName) {
            send(categoryName);
        }

        function send(text) {
            const msg = text || input.value.trim();
            if (!msg) return;

            addUserMessage(msg);
            input.value = '';
            processResponse(msg);
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message message-user';
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function processResponse(userMsg) {
            const msg = userMsg.trim();
            const category = Object.keys(businessCategories).find(k => msg.includes(k));
            
            if (category) {
                showCategoryDetail(category);
            }
            else if (msg.includes('今日') || msg.includes('任务')) {
                showTodayOverview();
            }
            else {
                // 默认回复
                setTimeout(() => {
                    typeWriter(`收到。请从下方选择业务分类，或直接输入关键词：

关键词示例：
• "引入客户" → 进入客户开发流程
• "账户开立" → 查看开户待办
• "客户服务" → 查看服务事项
• "交易服务" → 查看交易相关

也可以直接输入客户名称，如"华泰资管"`, () => {
                        addBusinessNav();
                    });
                    updateSuggestions(['👤 引入客户', '📝 账户开立', '💰 交易服务', '🎧 客户服务']);
                }, 500);
            }
        }

        // 显示分类详情
        function showCategoryDetail(categoryName) {
            const data = businessCategories[categoryName];
            const task = todayTasks[categoryName];
            
            setTimeout(() => {
                typeWriter(`已进入 **${categoryName}** 工作台

今日任务：${task.total} 项${task.urgent > 0 ? ` · 🔴 ${task.urgent} 个紧急` : ''}

请选择具体业务：`, () => {
                    // 添加子分类面板
                    const panelHtml = `
                        <div class="category-panel">
                            <div class="panel-header">
                                <div class="panel-icon" style="background:${data.color}20;color:${data.color};">${data.icon}</div>
                                <div class="panel-title">${categoryName}</div>
                            </div>
                            <div class="subcategory-list">
                                ${data.subcategories.map(sub => `
                                    <div class="sub-item" onclick="handleSubcategory('${categoryName}', '${sub.name}')">
                                        <div class="sub-icon">${sub.icon}</div>
                                        <div class="sub-info">
                                            <div class="sub-name">${sub.name}</div>
                                            <div class="sub-desc">${sub.desc}</div>
                                        </div>
                                        <div class="sub-arrow">›</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    
                    const lastMsg = chat.lastElementChild;
                    if (lastMsg) {
                        lastMsg.querySelector('.ai-content').insertAdjacentHTML('beforeend', panelHtml);
                    }
                    
                    // 根据不同分类显示示例任务
                    if (categoryName === '引入客户') {
                        setTimeout(() => {
                            addBizCard({
                                avatar: '华',
                                color: '#ef4444',
                                title: '华泰资管',
                                subtitle: '准入审核 · 剩余2小时',
                                body: '⚠️ 紧急：资料补充即将超时\n缺失：法人身份证、授权委托书',
                                tags: ['<span class="tag tag-urgent">即将超时</span>'],
                                actions: ['一键催办', '查看详情']
                            });
                        }, 400);
                    }
                    else if (categoryName === '客户服务') {
                        setTimeout(() => {
                            addBizCard({
                                avatar: '中',
                                color: '#f59e0b',
                                title: '中银基金',
                                subtitle: '舆情预警 · 2小时前',
                                body: '📰 发现负面舆情：投资业绩波动报道\n建议：主动沟通，准备说明材料',
                                tags: ['<span class="tag tag-warning">舆情预警</span>'],
                                actions: ['生成简报', '联系客户', '标记已读']
                            });
                        }, 400);
                    }
                    
                    chat.scrollTop = chat.scrollHeight;
                    updateSuggestions([...data.subcategories.slice(0,3).map(s => s.name), '查看全部', '返回首页']);
                });
            }, 500);
        }

        // 显示今日概览
        function showTodayOverview() {
            setTimeout(() => {
                typeWriter(`📊 **今日任务概览**

共 18 项待处理 · 2 个紧急

各业务线任务分布：`, () => {
                    const overviewHtml = `
                        <div class="biz-nav">
                            <div class="nav-grid">
                                ${Object.entries(businessCategories).map(([name, data]) => {
                                    const task = todayTasks[name];
                                    return `
                                        <div class="nav-item" onclick="selectCategory('${name}')" style="border-left:3px solid ${data.color};">
                                            <div class="nav-icon" style="font-size:20px;">${data.icon}</div>
                                            <div class="nav-name" style="font-size:14px;">${name}</div>
                                            <div class="nav-desc" style="font-size:13px;margin-top:4px;">${task.urgent > 0 ? `🔴 ${task.urgent} 紧急 · ` : ''}${task.total} 项</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                    
                    const lastMsg = chat.lastElementChild;
                    if (lastMsg) {
                        lastMsg.querySelector('.ai-content').insertAdjacentHTML('beforeend', overviewHtml);
                    }
                    chat.scrollTop = chat.scrollHeight;
                    updateSuggestions(['👤 引入客户', '📝 账户开立', '💰 交易服务', '🎧 客户服务']);
                });
            }, 500);
        }

        // 处理子分类点击
        function handleSubcategory(category, subcategory) {
            setTimeout(() => {
                typeWriter(`已进入 **${category} - ${subcategory}**

正在加载相关数据...`, () => {
                    // 这里可以加载具体子分类的数据
                    updateSuggestions(['查看列表', '添加新任务', '返回' + category, '返回首页']);
                });
            }, 300);
        }

        function addBizCard(data) {
            const card = document.createElement('div');
            card.className = 'biz-card urgent';
            card.innerHTML = `
                <div class="biz-header">
                    <div class="biz-avatar" style="background:${data.color}20;color:${data.color};">${data.avatar}</div>
                    <div>
                        <div class="biz-title">${data.title}</div>
                        <div class="biz-subtitle">${data.subtitle}</div>
                    </div>
                </div>
                <div class="biz-body">${data.body}</div>
                <div style="margin-bottom:12px;">${data.tags.join('')}</div>
                <div class="biz-actions">
                    ${data.actions.map(a => `<button class="btn ${a.includes('一键') ? 'btn-primary' : 'btn-secondary'}" onclick="send('${a}')">${a}</button>`).join('')}
                </div>
            `;
            
            const lastMsg = chat.lastElementChild;
            if (lastMsg && lastMsg.classList.contains('message-ai')) {
                lastMsg.querySelector('.ai-content').appendChild(card);
            }
            chat.scrollTop = chat.scrollHeight;
        }

        function updateSuggestions(list) {
            suggestions.innerHTML = list.map(s => `<div class="chip" onclick="send('${s.replace(/🔴|🟡|🔵|👤|📝|💰|🎧|✓|📊|🎯|/g, '').trim()}')">${s}</div>`).join('');
        }
    </script>
</body>
</html>
