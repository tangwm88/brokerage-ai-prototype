<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>机构经纪智能体</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #000000;
            --surface: #0a0a0f;
            --card: #15151a;
            --border: rgba(255,255,255,0.06);
            --text: #ffffff;
            --text-secondary: rgba(255,255,255,0.6);
            --primary: #19c37d;
            --warning: #f59e0b;
            --danger: #ef4444;
            --blue: #3b82f6;
            --purple: #8b5cf6;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        
        .app { height: 100vh; display: flex; flex-direction: column; }
        
        .top-bar {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        
        .brand { font-size: 16px; font-weight: 600; }
        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .status-dot {
            width: 6px; height: 6px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 100px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .message { max-width: 92%; animation: fadeIn 0.3s ease; }
        
        .message-user {
            align-self: flex-end;
            background: var(--card);
            padding: 12px 16px;
            border-radius: 20px 20px 4px 20px;
            font-size: 15px;
            line-height: 1.5;
        }
        
        .message-ai {
            display: flex;
            gap: 10px;
        }
        
        .ai-icon {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .ai-content {
            flex: 1;
            font-size: 15px;
            line-height: 1.7;
        }
        
        /* 目标概览卡片 */
        .goals-overview {
            background: linear-gradient(135deg, rgba(102,126,234,0.1), transparent);
            border: 1px solid rgba(102,126,234,0.2);
            border-radius: 16px;
            padding: 16px;
            margin: 8px 0;
        }
        
        .goals-title {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .goals-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        
        .goal-card {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .goal-card:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
        }
        
        .goal-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .goal-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .goal-count {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .goal-count.urgent { color: var(--danger); }
        .goal-count.warning { color: var(--warning); }
        
        /* 业务卡片 */
        .biz-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            margin: 10px 0;
        }
        
        .biz-card:hover { border-color: rgba(255,255,255,0.12); }
        
        .biz-card.urgent { border-left: 3px solid var(--danger); }
        .biz-card.warning { border-left: 3px solid var(--warning); }
        .biz-card.success { border-left: 3px solid var(--primary); }
        
        .biz-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .biz-avatar {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
        }
        
        .biz-title { font-size: 15px; font-weight: 600; }
        .biz-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .biz-body { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin: 12px 0; }
        
        .biz-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-primary { background: var(--primary); color: #000; font-weight: 500; }
        .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text); }
        .btn:hover { opacity: 0.9; }
        
        .tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 4px;
        }
        
        .tag-urgent { background: rgba(239,68,68,0.15); color: var(--danger); }
        .tag-warning { background: rgba(245,158,11,0.15); color: var(--warning); }
        .tag-success { background: rgba(25,195,125,0.15); color: var(--primary); }
        
        /* 分类引导列表 */
        .category-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 12px 0;
        }
        
        .category-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: var(--card);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .category-item:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.1);
        }
        
        .category-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .category-info { flex: 1; }
        .category-name { font-size: 15px; font-weight: 500; }
        .category-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .category-arrow { font-size: 18px; color: var(--text-secondary); }
        
        /* 输入区 */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 16px 24px;
            background: linear-gradient(180deg, transparent 0%, var(--bg) 30%);
        }
        
        .suggestions {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0;
            scrollbar-width: none;
        }
        
        .suggestions::-webkit-scrollbar { display: none; }
        
        .chip {
            padding: 6px 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .chip:hover { background: rgba(255,255,255,0.1); }
        
        .input-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 4px 4px 4px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .input-box:focus-within { border-color: rgba(255,255,255,0.15); }
        
        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 15px;
            outline: none;
            padding: 10px 0;
        }
        
        .input-field::placeholder { color: var(--text-secondary); }
        
        .input-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 18px;
        }
        
        .input-btn.send { background: var(--primary); color: #000; }
        
        /* 光标 */
        .cursor {
            display: inline-block;
            width: 8px; height: 18px;
            background: var(--primary);
            margin-left: 2px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <div class="brand">🦁 机构经纪智能体</div>
            <div class="status"><div class="status-dot"></div><span>在线</span></div>
        </div>

        <div class="chat" id="chat"></div>

        <div class="input-area">
            <div class="suggestions" id="suggestions"></div>
            <div class="input-box">
                <input type="text" class="input-field" id="input" placeholder="输入你想做的..." onkeypress="if(event.key==='Enter')send()">
                <div class="input-btn send" onclick="send()">↑</div>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const suggestions = document.getElementById('suggestions');

        // 今日数据
        const todayData = {
            goals: [
                { icon: '👤', name: '引入客户', count: 2, urgent: 1, color: '#3b82f6' },
                { icon: '📝', name: '账户开立', count: 3, urgent: 0, color: '#8b5cf6' },
                { icon: '💰', name: '交易服务', count: 5, urgent: 0, color: '#10b981' },
                { icon: '🎧', name: '客户服务', count: 4, urgent: 1, color: '#f59e0b' }
            ],
            customers: [
                { name: '华泰资管', type: '紧急', desc: '准入审核，资料待补充，剩余2小时', avatar: '华', color: '#ef4444', actions: ['一键催办', '查看详情'] },
                { name: '中银基金', type: '预警', desc: '舆情监控，发现1条负面信息', avatar: '中', color: '#f59e0b', actions: ['查看预警', '联系客户'] },
                { name: '华夏理财', type: '新客', desc: '邮件咨询，AI评估为高价值客户', avatar: '华', color: '#3b82f6', actions: ['开始评估', '分配跟进'] },
                { name: '易方达投资', type: '正常', desc: '交易活跃，无异常', avatar: '易', color: '#10b981', actions: ['交易分析', '发送研报'] }
            ]
        };

        // 初始欢迎
        window.onload = () => {
            setTimeout(() => {
                typeWriter(`早上好！我是你的机构经纪助手。

今天你的展业概况：
📊 4个业务目标 · 14项待办 · 2个紧急`, () => {
                    // 展示目标概览卡片
                    addGoalsOverview();
                    updateSuggestions(['查看引入客户', '查看账户开立', '交易服务', '客户服务']);
                });
            }, 300);
        };

        function typeWriter(text, callback) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message message-ai';
            wrapper.innerHTML = `
                <div class="ai-icon">🦁</div>
                <div class="ai-content"><span id="typing-text"></span><span class="cursor"></span></div>
            `;
            chat.appendChild(wrapper);
            chat.scrollTop = chat.scrollHeight;

            const span = wrapper.querySelector('#typing-text');
            let i = 0;
            const type = () => {
                if (i < text.length) {
                    span.textContent += text.charAt(i);
                    i++;
                    chat.scrollTop = chat.scrollHeight;
                    setTimeout(type, 15 + Math.random() * 20);
                } else {
                    wrapper.querySelector('.cursor').remove();
                    if (callback) callback();
                }
            };
            type();
        }

        function addGoalsOverview() {
            const goalsHtml = `
                <div class="goals-overview">
                    <div class="goals-title">🎯 今日业务目标</div>
                    <div class="goals-grid">
                        ${todayData.goals.map(g => `
                            <div class="goal-card" onclick="selectGoal('${g.name}')">
                                <div class="goal-icon">${g.icon}</div>
                                <div class="goal-name">${g.name}</div>
                                <div class="goal-count ${g.urgent > 0 ? 'urgent' : ''}">${g.urgent > 0 ? '⚠️ ' + g.urgent + '紧急 · ' : ''}${g.count}项</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            const lastMsg = chat.lastElementChild;
            if (lastMsg) {
                lastMsg.querySelector('.ai-content').insertAdjacentHTML('beforeend', goalsHtml);
            }
            chat.scrollTop = chat.scrollHeight;
        }

        function selectGoal(goalName) {
            send(goalName);
        }

        function send(text) {
            const msg = text || input.value.trim();
            if (!msg) return;

            addUserMessage(msg);
            input.value = '';
            processResponse(msg);
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message message-user';
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function processResponse(userMsg) {
            const msg = userMsg.toLowerCase();
            
            // 引入客户
            if (msg.includes('引入') || msg.includes('新客') || msg.includes('开发')) {
                setTimeout(() => {
                    typeWriter(`👤 **引入客户** 业务板

今日任务：**2位待跟进 · 1位紧急**

下面是当前客户线索：`, () => {
                        // 客户列表卡片
                        addCustomerCard(todayData.customers[2]); // 华夏理财
                        setTimeout(() => addCustomerCard(todayData.customers[0]), 400);
                        
                        updateSuggestions(['引入华夏理财', '催办华泰资管', '添加新线索', '查看全部客户']);
                    });
                }, 500);
            }
            // 账户开立
            else if (msg.includes('开户') || msg.includes('账户')) {
                setTimeout(() => {
                    typeWriter(`📝 **账户开立** 业务板

今日任务：**3个待审核 · 0个紧急**

当前开户进度：`, () => {
                        addBizCard({
                            avatar: '嘉',
                            color: '#8b5cf6',
                            title: '嘉实基金',
                            subtitle: '资料审核中',
                            body: '已提交：营业执照、法人身份证\n待审核：授权书、风险测评',
                            tags: [<span class="tag tag-success">资料完整</span>],
                            actions: ['快速审核', '退回补充', '联系客户']
                        });
                        updateSuggestions(['审核嘉实基金', '查看待审核列表', '开户流程指引']);
                    });
                }, 500);
            }
            // 交易服务
            else if (msg.includes('交易') || msg.includes('服务')) {
                setTimeout(() => {
                    typeWriter(`💰 **交易服务** 业务板

今日任务：**5个服务请求 · 交易活跃**

需要处理的服务：`, () => {
                        addBizCard({
                            avatar: '广',
                            color: '#10b981',
                            title: '广发基金',
                            subtitle: '算法交易配置',
                            body: '客户申请开通TWAP算法交易\n预计交易规模：5000万/日',
                            tags: [<span class="tag tag-success">高价值</span>],
                            actions: ['配置算法', '风险评估', '安排培训']
                        });
                        updateSuggestions(['配置算法交易', '查看交易异常', '服务报告']);
                    });
                }, 500);
            }
            // 客户服务
            else if (msg.includes('服务') || msg.includes('维护')) {
                setTimeout(() => {
                    typeWriter(`🎧 **客户服务** 业务板

今日任务：**4个待处理 · 1个预警**

客户动态：`, () => {
                        addBizCard(todayData.customers[1]); // 中银基金预警
                        setTimeout(() => {
                            addBizCard({
                                avatar: '鹏',
                                color: '#3b82f6',
                                title: '鹏华基金',
                                subtitle: '定期回访',
                                body: '本月满意度调研待发送\n上次回访：30天前',
                                tags: [<span class="tag">常规</span>],
                                actions: ['发送调研', '预约回访', '查看历史']
                            });
                        }, 300);
                        updateSuggestions(['处理中银预警', '发送鹏华调研', '客户满意度', '服务报告']);
                    });
                }, 500);
            }
            // 具体客户
            else if (msg.includes('华泰')) {
                setTimeout(() => {
                    typeWriter(`查看华泰资管详情：`, () => {
                        addBizCard({
                            avatar: '华',
                            color: '#ef4444',
                            title: '华泰资管',
                            subtitle: '准入审核中 · 剩余2小时',
                            body: '⚠️ **紧急：资料即将超时**

缺失材料：\n• 法人身份证复印件（正反面）\n• 授权委托书（加盖公章）\n• 风险测评问卷\n\n联系人：王经理 138xxxx8888',
                            tags: [<span class="tag tag-urgent">即将超时</span>, <span class="tag">公募基金</span>],
                            actions: ['✓ 一键催办', '电话提醒', '延后2小时', '标记已完成']
                        });
                        updateSuggestions(['✓ 一键催办', '电话提醒', '查看全部客户']);
                    });
                }, 500);
            }
            else if (msg.includes('华夏')) {
                setTimeout(() => {
                    typeWriter(`✓ 已识别「华夏理财」\n正在创建客户档案...`, () => {
                        setTimeout(() => {
                            addBizCard({
                                avatar: '华',
                                color: '#3b82f6',
                                title: '华夏理财',
                                subtitle: '新客户 · 待评估',
                                body: '📊 **AI评估报告**

客户类型：公募基金\n预计规模：3-5亿\n匹配度：92%\n建议优先级：高\n\n联系人：张总\n需求：股票交易、算法交易',
                                tags: [<span class="tag tag-success">高价值</span>, <span class="tag">匹配度高</span>],
                                actions: ['开始资质评估', '分配给张经理', '添加到日程']
                            });
                            updateSuggestions(['开始资质评估', '分配给张经理', '添加到今日任务']);
                        }, 600);
                    });
                }, 500);
            }
            else if (msg.includes('催办') || msg.includes('处理')) {
                setTimeout(() => {
                    typeWriter(`✓ **已发送催办通知**

📱 短信+邮件已发送至：王经理（华泰资管）
⏱️ 预计10分钟内送达
🔔 我会在对方查看后第一时间提醒你

当前状态：等待回复`);
                    updateSuggestions(['👤 查看其他客户', '📊 今日业绩', '🎯 业务目标']);
                }, 600);
            }
            // 默认
            else {
                setTimeout(() => {
                    typeWriter(`收到。我可以帮你处理以下业务：

**引入客户** - 线索管理、资质评估、分配跟进
**账户开立** - 资料审核、权限配置、进度跟踪  
**交易服务** - 算法配置、订单执行、异常处理
**客户服务** - 舆情监控、定期回访、满意度管理

请选择业务目标或直接输入客户名称。`, () => {
                        // 再次显示目标选择
                        addGoalsOverview();
                    });
                    updateSuggestions(['👤 引入客户', '📝 账户开立', '💰 交易服务', '🎧 客户服务']);
                }, 500);
            }
        }

        function addCustomerCard(data) {
            const card = document.createElement('div');
            card.className = `biz-card ${data.type === '紧急' ? 'urgent' : data.type === '预警' ? 'warning' : data.type === '新客' ? '' : 'success'}`;
            card.innerHTML = `
                <div class="biz-header">
                    <div class="biz-avatar" style="background:${data.color}20;color:${data.color};">${data.avatar}</div>
                    <div>
                        <div class="biz-title">${data.name}</div>
                        <div class="biz-subtitle">${data.type === '紧急' ? '🔴 ' : data.type === '预警' ? '🟡 ' : data.type === '新客' ? '🔵 ' : '🟢 '}${data.type}</div>
                    </div>
                </div>
                <div class="biz-body">${data.desc}</div>
                <div class="biz-actions">
                    ${data.actions.map(a => `<button class="btn ${a.includes('✓') ? 'btn-primary' : 'btn-secondary'}" onclick="send('${a.replace('✓ ', '')} ${data.name}')">${a}</button>`).join('')}
                </div>
            `;
            
            const lastMsg = chat.lastElementChild;
            if (lastMsg && lastMsg.classList.contains('message-ai')) {
                lastMsg.querySelector('.ai-content').appendChild(card);
            }
            chat.scrollTop = chat.scrollHeight;
        }

        function addBizCard(data) {
            const card = document.createElement('div');
            card.className = 'biz-card';
            card.innerHTML = `
                <div class="biz-header">
                    <div class="biz-avatar" style="background:${data.color}20;color:${data.color};">${data.avatar}</div>
                    <div>
                        <div class="biz-title">${data.title}</div>
                        <div class="biz-subtitle">${data.subtitle}</div>
                    </div>
                </div>
                <div class="biz-body">${data.body}</div>
                ${data.tags.length > 0 ? `<div style="margin-bottom:12px;">${data.tags.join('')}</div>` : ''}
                <div class="biz-actions">
                    ${data.actions.map(a => `<button class="btn ${a.includes('✓') ? 'btn-primary' : 'btn-secondary'}" onclick="send('${a.replace('✓ ', '')}')">${a}</button>`).join('')}
                </div>
            `;
            
            const lastMsg = chat.lastElementChild;
            if (lastMsg && lastMsg.classList.contains('message-ai')) {
                lastMsg.querySelector('.ai-content').appendChild(card);
            }
            chat.scrollTop = chat.scrollHeight;
        }

        function updateSuggestions(list) {
            suggestions.innerHTML = list.map(s => `<div class="chip" onclick="send('${s.replace(/🔴|🟡|🔵|🟢|👤|📝|💰|🎧|✓|📊|🎯/g, '').trim()}')">${s}</div>`).join('');
        }
    </script>
</body>
</html>
