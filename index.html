<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>机构经纪智能体</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --card: #ffffff;
            --border: rgba(0,0,0,0.08);
            --text: #1d1d1f;
            --text-secondary: rgba(0,0,0,0.5);
            --primary: #007aff;
            --success: #34c759;
            --warning: #ff9500;
            --danger: #ff3b30;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        
        .app { height: 100vh; display: flex; flex-direction: column; }
        
        .top-bar {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        
        .brand { font-size: 16px; font-weight: 600; }
        .status { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
        .status-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message { max-width: 92%; animation: fadeIn 0.3s ease; }
        
        .message-user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            padding: 12px 16px;
            border-radius: 20px 20px 4px 20px;
            font-size: 15px;
            line-height: 1.5;
        }
        
        .message-ai { display: flex; gap: 10px; }
        
        .ai-icon {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
        }
        
        .ai-content { flex: 1; font-size: 15px; line-height: 1.7; }
        
        /* 工作台概览卡片 */
        .workbench-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin: 8px 0;
        }
        
        .wb-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .wb-icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        
        .wb-title { font-size: 16px; font-weight: 600; flex: 1; }
        .wb-count { font-size: 13px; color: var(--text-secondary); }
        
        /* 任务项 */
        .task-list { display: flex; flex-direction: column; gap: 10px; }
        
        .task-item {
            background: rgba(0,0,0,0.02);
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            position: relative;
        }
        
        .task-item:hover {
            background: rgba(0,0,0,0.04);
            border-color: rgba(0,0,0,0.1);
        }
        
        .task-item.urgent { border-left: 3px solid var(--danger); }
        .task-item.warning { border-left: 3px solid var(--warning); }
        .task-item.success { border-left: 3px solid var(--success); }
        
        .task-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .task-avatar {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 600;
        }
        
        .task-info { flex: 1; }
        .task-name { font-size: 14px; font-weight: 500; }
        .task-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        
        .task-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .status-urgent { background: rgba(255,59,48,0.1); color: var(--danger); }
        .status-warning { background: rgba(255,149,0,0.1); color: var(--warning); }
        .status-progress { background: rgba(0,122,255,0.1); color: var(--primary); }
        
        /* 步骤进度 */
        .task-steps {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 10px 0;
            padding: 10px;
            background: rgba(0,0,0,0.02);
            border-radius: 8px;
        }
        
        .step-dot {
            width: 20px; height: 20px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px;
        }
        
        .step-done { background: var(--success); color: white; }
        .step-current { background: var(--primary); color: white; }
        .step-pending { background: rgba(0,0,0,0.1); color: var(--text-secondary); }
        
        .step-line {
            flex: 1;
            height: 2px;
            background: rgba(0,0,0,0.1);
            position: relative;
        }
        
        .step-line.done { background: var(--success); }
        .step-line.current { background: linear-gradient(90deg, var(--success) 50%, rgba(0,0,0,0.1) 50%); }
        
        /* AI提醒 */
        .ai-reminder {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 10px;
            background: rgba(0,122,255,0.05);
            border-radius: 8px;
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .ai-reminder-icon { font-size: 14px; }
        
        /* 卡片详情 */
        .detail-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin: 10px 0;
        }
        
        .detail-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .detail-avatar {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 600;
        }
        
        .detail-title { font-size: 17px; font-weight: 600; }
        .detail-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
        
        .detail-section { margin: 16px 0; }
        .section-title { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--text-secondary); }
        
        .detail-body { font-size: 14px; line-height: 1.7; }
        
        .detail-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-secondary { background: rgba(0,0,0,0.06); color: var(--text); }
        .btn-success { background: var(--success); color: #fff; }
        .btn:hover { opacity: 0.9; }
        
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 6px;
        }
        
        .tag-urgent { background: rgba(255,59,48,0.1); color: var(--danger); }
        .tag-warning { background: rgba(255,149,0,0.1); color: var(--warning); }
        .tag-success { background: rgba(52,199,89,0.1); color: var(--success); }
        
        /* 输入区 */
        .input-area {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            padding: 12px 16px 24px;
            background: linear-gradient(180deg, transparent 0%, var(--bg) 30%);
        }
        
        .suggestions {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0;
            scrollbar-width: none;
        }
        
        .suggestions::-webkit-scrollbar { display: none; }
        
        .chip {
            padding: 6px 12px;
            background: rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
        }
        
        .chip:hover { background: rgba(0,0,0,0.1); }
        
        .input-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 4px 4px 4px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        
        .input-box:focus-within { border-color: rgba(0,0,0,0.2); }
        
        .input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 15px;
            outline: none;
            padding: 10px 0;
        }
        
        .input-field::placeholder { color: var(--text-secondary); }
        
        .input-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 18px;
        }
        
        .input-btn.send { background: var(--primary); color: #fff; }
        
        .cursor {
            display: inline-block;
            width: 8px; height: 18px;
            background: var(--primary);
            margin-left: 2px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <div class="brand">🦁 机构经纪智能体</div>
            <div class="status"><div class="status-dot"></div><span>AI运行中</span></div>
        </div>

        <div class="chat" id="chat"></div>

        <div class="input-area">
            <div class="suggestions" id="suggestions"></div>
            <div class="input-box">
                <input type="text" class="input-field" id="input" placeholder="输入任务名称或点击查看工作台..." onkeypress="if(event.key==='Enter')send()">
                <div class="input-btn send" onclick="send()">↑</div>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const suggestions = document.getElementById('suggestions');

        // 今日任务数据 - AI驱动的工作台
        const todayWorkbench = {
            '引入客户': {
                icon: '👤',
                color: '#3b82f6',
                total: 4,
                tasks: [
                    {
                        name: '华泰资管',
                        status: 'urgent',
                        statusText: '🔴 即将超时',
                        steps: ['线索收集', '资质初筛', '客户画像', '分配跟进'],
                        currentStep: 2,
                        reminder: '⏰ 资料补充截止剩余2小时，建议立即催办',
                        details: {
                            title: '华泰资管',
                            subtitle: '准入审核中 · 公募基金',
                            body: '⚠️ **紧急事项**\n\n缺失材料：\n• 法人身份证复印件（正反面）\n• 授权委托书（加盖公章）\n• 风险测评问卷\n\n联系人：王经理 138xxxx8888',
                            actions: ['✓ 一键催办', '电话提醒', '延后2小时']
                        }
                    },
                    {
                        name: '华夏理财',
                        status: 'progress',
                        statusText: '🔵 评估中',
                        steps: ['线索收集', '资质初筛', '客户画像', '分配跟进'],
                        currentStep: 1,
                        reminder: '💡 AI评估完成，建议分配给张经理跟进',
                        details: {
                            title: '华夏理财',
                            subtitle: '新客户 · AI评估92分',
                            body: '📊 **AI评估报告**\n\n客户类型：公募基金\n预计规模：3-5亿\n匹配度：92%（高价值）\n\n联系人：张总\n需求：股票交易、算法交易',
                            actions: ['开始评估', '分配给张经理', '添加到日程']
                        }
                    }
                ]
            },
            '账户开立': {
                icon: '📝',
                color: '#8b5cf6',
                total: 3,
                tasks: [
                    {
                        name: '嘉实基金',
                        status: 'progress',
                        statusText: '🔵 审核中',
                        steps: ['准入审核', '协议生成', '权限配置', '账户激活'],
                        currentStep: 1,
                        reminder: '📋 资料齐全，预计30分钟完成审核',
                        details: {
                            title: '嘉实基金',
                            subtitle: '资料审核中 · 第2步/4步',
                            body: '✓ **已提交**：营业执照、法人身份证\n⏳ **待审核**：授权书、风险测评\n\n预计完成时间：今日14:30',
                            actions: ['快速审核', '退回补充', '联系客户']
                        }
                    }
                ]
            },
            '交易服务': {
                icon: '💰',
                color: '#10b981',
                total: 5,
                tasks: [
                    {
                        name: '广发基金',
                        status: 'progress',
                        statusText: '🔵 配置中',
                        steps: ['算法配置', '风险评估', '订单执行', '成交反馈'],
                        currentStep: 0,
                        reminder: '⚙️ TWAP算法参数待配置',
                        details: {
                            title: '广发基金',
                            subtitle: '算法交易配置 · 预计规模5000万/日',
                            body: '**申请服务**：TWAP算法交易\n\n配置参数：\n• 时间窗口：9:30-15:00\n• 单笔上限：100万\n• 滑点控制：≤0.1%',
                            actions: ['配置算法', '风险评估', '安排培训']
                        }
                    }
                ]
            },
            '客户服务': {
                icon: '🎧',
                color: '#f59e0b',
                total: 6,
                tasks: [
                    {
                        name: '中银基金',
                        status: 'warning',
                        statusText: '🟡 舆情预警',
                        steps: ['舆情监控', '简报生成', '客户沟通', '跟踪反馈'],
                        currentStep: 0,
                        reminder: '📰 2小时前发现负面舆情，建议主动沟通',
                        details: {
                            title: '中银基金',
                            subtitle: '舆情预警 · 持仓2.3亿',
                            body: '📰 **舆情预警详情**\n\n来源：财经网\n时间：2小时前\n内容：投资业绩波动报道\n\n建议措施：\n• 主动联系客户说明情况\n• 准备业绩说明材料',
                            actions: ['生成简报', '联系客户', '标记已读']
                        }
                    },
                    {
                        name: '鹏华基金',
                        status: 'progress',
                        statusText: '🔵 待回访',
                        steps: ['定期回访', '满意度调研', '反馈收集', '服务优化'],
                        currentStep: 0,
                        reminder: '📞 30天未回访，建议今日联系',
                        details: {
                            title: '鹏华基金',
                            subtitle: '定期回访 · 上次30天前',
                            body: '**回访提醒**\n\n客户状态：正常\n交易活跃度：高\n满意度历史：4.5/5.0\n\n建议话题：\n• 近期交易体验\n• 新产品推荐',
                            actions: ['发送调研', '预约回访', '查看历史']
                        }
                    }
                ]
            }
        };

        // 初始欢迎
        window.onload = () => {
            setTimeout(() => {
                typeWriter(`早上好！AI已为你准备好今日工作台。

📊 **今日概览**：18项任务 · 2个紧急 · 5个提醒`, () => {
                    addWorkbenchOverview();
                    updateSuggestions(['👤 引入客户', '📝 账户开立', '💰 交易服务', '🎧 客户服务']);
                });
            }, 300);
        };

        function typeWriter(text, callback) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message message-ai';
            wrapper.innerHTML = `
                <div class="ai-icon">🦁</div>
                <div class="ai-content"><span id="typing-text"></span><span class="cursor"></span></div>
            `;
            chat.appendChild(wrapper);
            chat.scrollTop = chat.scrollHeight;

            const span = wrapper.querySelector('#typing-text');
            let i = 0;
            const type = () => {
                if (i < text.length) {
                    span.textContent += text.charAt(i);
                    i++;
                    chat.scrollTop = chat.scrollHeight;
                    setTimeout(type, 15 + Math.random() * 20);
                } else {
                    wrapper.querySelector('.cursor').remove();
                    if (callback) callback();
                }
            };
            type();
        }

        // 添加工作台概览
        function addWorkbenchOverview() {
            Object.entries(todayWorkbench).forEach(([category, data]) => {
                const wbHtml = `
                    <div class="workbench-card">
                        <div class="wb-header">
                            <div class="wb-icon" style="background:${data.color}15;color:${data.color};">${data.icon}</div>
                            <div class="wb-title">${category}</div>
                            <div class="wb-count">${data.total} 项任务 ›</div>
                        </div>
                        <div class="task-list">
                            ${data.tasks.map((task, idx) => `
                                <div class="task-item ${task.status}" onclick="showTaskDetail('${category}', ${idx})">
                                    <div class="task-header">
                                        <div class="task-avatar" style="background:${data.color}15;color:${data.color};">${task.name[0]}</div>
                                        <div class="task-info">
                                            <div class="task-name">${task.name}</div>
                                            <div class="task-meta">${task.statusText}</div>
                                        </div>
                                    </div>
                                    
                                    <div class="task-steps">
                                        ${task.steps.map((step, sIdx) => {
                                            if (sIdx < task.currentStep) {
                                                return `<div class="step-dot step-done">✓</div>`;
                                            } else if (sIdx === task.currentStep) {
                                                return `<div class="step-dot step-current">${sIdx+1}</div>`;
                                            } else {
                                                return `<div class="step-dot step-pending">${sIdx+1}</div>`;
                                            }
                                        }).join('<div class="step-line ${task.currentStep > sIdx ? 'done' : task.currentStep === sIdx ? 'current' : ''}"></div>')}
                                    </div>
                                    
                                    <div class="ai-reminder">
                                        <span class="ai-reminder-icon">🤖</span>
                                        <span>${task.reminder}</span>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                
                const lastMsg = chat.lastElementChild;
                if (lastMsg) {
                    lastMsg.querySelector('.ai-content').insertAdjacentHTML('beforeend', wbHtml);
                }
            });
            chat.scrollTop = chat.scrollHeight;
        }

        function showTaskDetail(category, taskIndex) {
            const task = todayWorkbench[category].tasks[taskIndex];
            const details = task.details;
            
            // 用户消息
            addUserMessage(`查看 ${task.name} 详情`);
            
            setTimeout(() => {
                typeWriter(`正在打开 **${task.name}** 任务卡片...`, () => {
                    const detailHtml = `
                        <div class="detail-card">
                            <div class="detail-header">
                                <div class="detail-avatar" style="background:${todayWorkbench[category].color}15;color:${todayWorkbench[category].color};">${task.name[0]}</div>
                                <div>
                                    <div class="detail-title">${details.title}</div>
                                    <div class="detail-subtitle">${details.subtitle}</div>
                                </div>
                            </div>
                            
                            <div class="detail-body">${details.body.replace(/\n/g, '<br>')}</div>
                            
                            <div class="detail-actions">
                                ${details.actions.map(a => `
                                    <button class="btn ${a.includes('✓') ? 'btn-success' : 'btn-secondary'}" onclick="handleAction('${a.replace('✓ ', '')}', '${task.name}')">${a}</button>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    
                    const lastMsg = chat.lastElementChild;
                    if (lastMsg) {
                        lastMsg.querySelector('.ai-content').insertAdjacentHTML('beforeend', detailHtml);
                    }
                    chat.scrollTop = chat.scrollHeight;
                    
                    updateSuggestions(details.actions.map(a => a.replace('✓ ', '')).slice(0, 3));
                });
            }, 400);
        }

        function handleAction(action, taskName) {
            addUserMessage(action);
            
            setTimeout(() => {
                if (action.includes('催办')) {
                    typeWriter(`✓ **催办已发送**\n\n📱 短信+邮件已发送至：王经理（华泰资管）\n⏱️ 预计10分钟内送达\n🔔 我会在对方查看后提醒你`);
                } else if (action.includes('分配')) {
                    typeWriter(`✓ **已分配**\n\n客户：${taskName}\n分配给：张经理\n跟进时间：今日15:00\n\n系统已自动设置提醒。`);
                } else if (action.includes('简报')) {
                    typeWriter(`📄 **舆情简报生成中**\n\n正在整理：\n• 舆情来源与传播路径\n• 客户持仓影响分析\n• 建议沟通话术\n\n预计1分钟后完成...`);
                } else {
                    typeWriter(`✓ **已记录**：${action}\n\nAI会继续跟踪该任务进展，有更新时会主动提醒你。`);
                }
                updateSuggestions(['查看其他任务', '返回工作台', '今日概览']);
            }, 500);
        }

        function send(text) {
            const msg = text || input.value.trim();
            if (!msg) return;

            addUserMessage(msg);
            input.value = '';

            // 简单响应
            setTimeout(() => {
                if (msg.includes('工作台') || msg.includes('概览')) {
                    typeWriter(`📊 **今日工作台概览**\n\n已为你整理全部18项任务：`, () => {
                        addWorkbenchOverview();
                    });
                } else {
                    typeWriter(`收到。请从下方工作台选择任务，或直接点击任务卡片查看详情。`, () => {
                        addWorkbenchOverview();
                    });
                }
                updateSuggestions(['👤 引入客户', '📝 账户开立', '💰 交易服务', '🎧 客户服务']);
            }, 500);
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message message-user';
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function updateSuggestions(list) {
            suggestions.innerHTML = list.map(s => `<div class="chip" onclick="send('${s.replace(/🔴|🟡|🔵|👤|📝|💰|🎧|✓|📊|/g, '').trim()}')">${s}</div>`).join('');
        }
    </script>
</body>
</html>
