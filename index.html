<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>机构经纪智能体 - 业务导航</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #f5f5f7; --surface: #ffffff; --card: #ffffff;
            --border: rgba(0,0,0,0.08); --text: #1d1d1f;
            --text-secondary: rgba(0,0,0,0.5); --primary: #007aff;
            --success: #34c759; --warning: #ff9500; --danger: #ff3b30;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        .app { height: 100vh; display: flex; flex-direction: column; }
        .top-bar { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--surface); }
        .brand { font-size: 16px; font-weight: 600; }
        .status { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
        .status-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 92%; animation: fadeIn 0.3s ease; }
        .message-user { align-self: flex-end; background: var(--primary); color: white; padding: 12px 16px; border-radius: 20px 20px 4px 20px; font-size: 15px; }
        .message-ai { display: flex; gap: 10px; }
        .ai-icon { width: 28px; height: 28px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .ai-content { flex: 1; font-size: 15px; line-height: 1.7; }
        .nav-center { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin: 8px 0; }
        .nav-header { text-align: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
        .nav-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
        .nav-subtitle { font-size: 13px; color: var(--text-secondary); }
        .biz-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .biz-entry { background: rgba(0,0,0,0.02); border-radius: 16px; padding: 20px 16px; cursor: pointer; transition: all 0.25s; border: 2px solid transparent; text-align: center; position: relative; }
        .biz-entry:hover { background: rgba(0,0,0,0.04); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
        .entry-icon { font-size: 36px; margin-bottom: 12px; transition: transform 0.3s; }
        .biz-entry:hover .entry-icon { transform: scale(1.1); }
        .entry-keyword { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
        .entry-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }
        .entry-count { margin-top: 10px; font-size: 12px; padding: 4px 10px; border-radius: 12px; display: inline-block; }
        .count-urgent { background: rgba(255,59,48,0.1); color: var(--danger); }
        .count-normal { background: rgba(0,0,0,0.05); color: var(--text-secondary); }
        .quick-prompts { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
        .quick-title { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
        .prompt-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .prompt-tag { padding: 8px 14px; background: rgba(0,122,255,0.08); border: 1px solid rgba(0,122,255,0.2); border-radius: 16px; font-size: 13px; color: var(--primary); cursor: pointer; transition: all 0.2s; }
        .prompt-tag:hover { background: rgba(0,122,255,0.15); }
        .category-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin: 10px 0; }
        .cat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .cat-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .cat-title { font-size: 18px; font-weight: 600; }
        .sub-list { display: flex; flex-direction: column; gap: 10px; }
        .sub-card { display: flex; align-items: center; gap: 14px; padding: 16px; background: rgba(0,0,0,0.02); border-radius: 14px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .sub-card:hover { background: rgba(0,0,0,0.04); }
        .task-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin: 10px 0; }
        .task-card.urgent { border-left: 4px solid var(--danger); }
        .task-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
        .task-avatar { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; }
        .task-title { font-size: 16px; font-weight: 600; }
        .task-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
        .task-body { font-size: 14px; line-height: 1.7; margin: 14px 0; }
        .task-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 10px 18px; border-radius: 10px; font-size: 14px; cursor: pointer; transition: all 0.2s; border: none; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-secondary { background: rgba(0,0,0,0.06); color: var(--text); }
        .btn-success { background: var(--success); color: #fff; }
        .tag { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 12px; margin-right: 6px; }
        .tag-urgent { background: rgba(255,59,48,0.1); color: var(--danger); }
        .input-area { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px 24px; background: linear-gradient(180deg, transparent 0%, var(--bg) 30%); }
        .suggestions { display: flex; gap: 8px; overflow-x: auto; padding: 8px 0; scrollbar-width: none; }
        .suggestions::-webkit-scrollbar { display: none; }
        .chip { padding: 6px 12px; background: rgba(0,0,0,0.05); border: 1px solid var(--border); border-radius: 14px; font-size: 13px; white-space: nowrap; cursor: pointer; }
        .chip:hover { background: rgba(0,0,0,0.1); }
        .input-box { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 4px 4px 4px 16px; display: flex; align-items: center; gap: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .input-box:focus-within { border-color: rgba(0,0,0,0.2); }
        .input-field { flex: 1; background: transparent; border: none; color: var(--text); font-size: 15px; outline: none; padding: 10px 0; }
        .input-field::placeholder { color: var(--text-secondary); }
        .input-btn { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
        .input-btn.send { background: var(--primary); color: #fff; }
        .cursor { display: inline-block; width: 8px; height: 18px; background: var(--primary); margin-left: 2px; animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <div class="brand">🦁 机构经纪智能体</div>
            <div class="status"><div class="status-dot"></div><span>AI运行中</span></div>
        </div>
        <div class="chat" id="chat"></div>
        <div class="input-area">
            <div class="suggestions" id="suggestions"></div>
            <div class="input-box">
                <input type="text" class="input-field" id="input" placeholder="输入关键词或点击上方入口..." onkeypress="if(event.key==='Enter')send()">
                <div class="input-btn send" onclick="send()">↑</div>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const suggestions = document.getElementById('suggestions');

        const businessNav = {
            '引入客户': {
                color: '#3b82f6',
                desc: '线索收集、资质评估、分配跟进',
                count: { total: 4, urgent: 1 },
                subcategories: [
                    { name: '线索收集', desc: '从邮件、活动识别客户线索', color: '#3b82f6' },
                    { name: '资质初筛', desc: 'AI自动评估客户资质', color: '#8b5cf6' },
                    { name: '客户画像', desc: '完善信息、分析需求', color: '#ec4899' },
                    { name: '分配跟进', desc: '智能分配、设置提醒', color: '#10b981' }
                ],
                cases: [
                    { title: '华泰资管 - 资料待补充', desc: '准入审核中，2小时截止', urgent: true },
                    { title: '华夏理财 - AI评估完成', desc: '92分高价值客户，建议跟进', urgent: false }
                ]
            },
            '账户开立': {
                color: '#8b5cf6',
                desc: '准入审核、协议签署、权限配置',
                count: { total: 3, urgent: 0 },
                subcategories: [
                    { name: '准入审核', desc: '资料完整性、合规性审核', color: '#8b5cf6' },
                    { name: '协议生成', desc: '自动生成开户协议', color: '#3b82f6' },
                    { name: '权限配置', desc: '交易权限、风控规则', color: '#f59e0b' },
                    { name: '账户激活', desc: '开通通知、使用指导', color: '#10b981' }
                ],
                cases: [
                    { title: '嘉实基金 - 资料审核中', desc: '授权书待补充，预计今日完成', urgent: false },
                    { title: '南方基金 - 协议待签署', desc: '电子协议已发送，等待回复', urgent: false }
                ]
            },
            '交易服务': {
                color: '#10b981',
                desc: '算法配置、订单执行、成交分析',
                count: { total: 5, urgent: 0 },
                subcategories: [
                    { name: '算法配置', desc: 'TWAP/VWAP参数设置', color: '#10b981' },
                    { name: '订单执行', desc: '实时监控、智能拆单', color: '#3b82f6' },
                    { name: '异常预警', desc: '价格异动、风控预警', color: '#ef4444' },
                    { name: '成交分析', desc: '交易成本分析', color: '#8b5cf6' }
                ],
                cases: [
                    { title: '广发基金 - 算法配置申请', desc: 'TWAP算法，5000万/日规模', urgent: false },
                    { title: '博时基金 - 成交异常提醒', desc: '昨日大单成交滑点超阈值', urgent: false }
                ]
            },
            '客户服务': {
                color: '#f59e0b',
                desc: '咨询响应、舆情监控、风险预警',
                count: { total: 6, urgent: 1 },
                subcategories: [
                    { name: '咨询响应', desc: '业务咨询、知识库支持', color: '#3b82f6' },
                    { name: '对账服务', desc: '自动生成对账单', color: '#8b5cf6' },
                    { name: '舆情跟踪', desc: '监控客户主体舆情', color: '#f59e0b' },
                    { name: '监管关联', desc: '监管问询跟踪', color: '#ef4444' },
                    { name: '风险预警', desc: '综合风险评分', color: '#f97316' },
                    { name: '满意度管理', desc: '定期调研、服务优化', color: '#10b981' }
                ],
                cases: [
                    { title: '中银基金 - 舆情预警', desc: '负面报道，需主动沟通', urgent: true },
                    { title: '鹏华基金 - 定期回访', desc: '30天未回访，建议今日联系', urgent: false }
                ]
            }
        };

        window.onload = () => {
            setTimeout(() => {
                typeWriter(`📋 今日重点工作：`, () => {
                    addBusinessNavCenter();
                    updateSuggestions(['🔍 潜客挖掘', '⚡ 快速开户', '⚙️ 算法申请', '📞 客户回访']);
                });
            }, 200);
        };

        function typeWriter(text, callback) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message message-ai';
            wrapper.innerHTML = `<div class="ai-icon">🦁</div><div class="ai-content"><span id="typing-text"></span><span class="cursor"></span></div>`;
            chat.appendChild(wrapper);
            chat.scrollTop = chat.scrollHeight;
            const span = wrapper.querySelector('#typing-text');
            let i = 0;
            const type = () => {
                if (i < text.length) {
                    span.textContent += text.charAt(i);
                    i++;
                    chat.scrollTop = chat.scrollHeight;
                    setTimeout(type, 15 + Math.random() * 20);
                } else {
                    wrapper.querySelector('.cursor').remove();
                    if (callback) callback();
                }
            };
            type();
        }

        function addBusinessNavCenter() {
            const navHtml = `
                <div class="nav-center">
                    <div class="biz-grid">
                        ${Object.entries(businessNav).map(([keyword, data]) => {
                            const firstCase = data.cases && data.cases[0] ? data.cases[0] : null;
                            const secondCase = data.cases && data.cases[1] ? data.cases[1] : null;
                            return `
                            <div class="biz-entry" onclick="enterCategory('${keyword}')" style="border-color:transparent;text-align:left;" onmouseover="this.style.borderColor='${data.color}40'" onmouseout="this.style.borderColor='transparent'">
                                <div class="entry-keyword" style="font-size:18px;margin-bottom:6px;">${keyword}</div>
                                <div class="entry-desc" style="font-size:13px;margin-bottom:12px;">${data.desc}</div>
                                <div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(0,0,0,0.05);">
                                    <div style="font-size:12px;color:var(--text-secondary);margin-bottom:10px;">
                                        ${data.count.urgent > 0 ? `<span style="color:var(--danger);font-weight:500;">🔴 ${data.count.urgent} 紧急</span> · ` : ''}<span style="font-weight:500;">${data.count.total} 项待办</span>
                                    </div>
                                    ${firstCase ? `
                                    <div style="font-size:12px;margin-bottom:8px;padding:8px;background:rgba(0,0,0,0.02);border-radius:6px;${firstCase.urgent ? 'border-left:2px solid var(--danger);' : ''}">
                                        <div style="font-weight:500;color:${firstCase.urgent ? 'var(--danger)' : 'var(--text)'};margin-bottom:2px;">${firstCase.title}</div>
                                        <div style="color:var(--text-secondary);">${firstCase.desc}</div>
                                    </div>
                                    ` : ''}
                                    ${secondCase ? `
                                    <div style="font-size:12px;padding:8px;background:rgba(0,0,0,0.02);border-radius:6px;${secondCase.urgent ? 'border-left:2px solid var(--danger);' : ''}">
                                        <div style="font-weight:500;color:${secondCase.urgent ? 'var(--danger)' : 'var(--text)'};margin-bottom:2px;">${secondCase.title}</div>
                                        <div style="color:var(--text-secondary);">${secondCase.desc}</div>
                                    </div>
                                    ` : ''}
                                </div>
                            </div>
                        `}).join('')}
                    </div>
                    <div class="quick-prompts">
                        <div class="quick-title">💡 常用提示词（可直接点击或输入）</div>
                        <div class="prompt-tags">
                            <div class="prompt-tag" onclick="send('引入华夏理财')">引入华夏理财</div>
                            <div class="prompt-tag" onclick="send('查看华泰资管')">查看华泰资管</div>
                            <div class="prompt-tag" onclick="send('处理舆情预警')">处理舆情预警</div>
                            <div class="prompt-tag" onclick="send('今日任务')">今日任务</div>
                        </div>
                    </div>
                </div>`;
            const lastMsg = chat.lastElementChild;
            if (lastMsg) lastMsg.querySelector('.ai-content').insertAdjacentHTML('beforeend', navHtml);
            chat.scrollTop = chat.scrollHeight;
        }

        function enterCategory(keyword) { send(keyword); }

        function send(text) {
            const msg = text || input.value.trim();
            if (!msg) return;
            addUserMessage(msg);
            input.value = '';
            processResponse(msg);
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message message-user';
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function processResponse(userMsg) {
            const msg = userMsg.trim();
            const keyword = Object.keys(businessNav).find(k => msg.includes(k));
            
            // 上方工作台 - 存量+在途
            if (keyword) {
                showCategoryInterface(keyword);
            }
            // 底部快捷入口 - 新增增量
            else if (msg.includes('潜客挖掘') || msg.includes('新客引入')) {
                showNewLeadEntry();
            }
            else if (msg.includes('快速开户')) {
                showQuickOpenAccount();
            }
            else if (msg.includes('算法申请')) {
                showAlgoApply();
            }
            else if (msg.includes('客户回访')) {
                showCustomerVisit();
            }
            else if (msg.includes('今日') || msg.includes('任务') || msg.includes('工作台')) {
                showTodayOverview();
            }
            else if (msg.includes('华泰')) showTaskDetail('华泰资管');
            else if (msg.includes('华夏')) showTaskDetail('华夏理财');
            else {
                setTimeout(() => {
                    typeWriter(`收到。请从上方选择今日重点工作，或使用底部快捷入口发起新业务：

• 🔍 潜客挖掘 → 发现新客户线索
• ⚡ 快速开户 → 新客户准入办理  
• ⚙️ 算法申请 → 交易服务开通
• 📞 客户回访 → 主动服务触达`, () => { addBusinessNavCenter(); });
                    updateSuggestions(['🔍 潜客挖掘', '⚡ 快速开户', '⚙️ 算法申请', '📞 客户回访']);
                }, 500);
            }
        }

        function showCategoryInterface(keyword) {
            const data = businessNav[keyword];
            setTimeout(() => {
                typeWriter(`已进入 **${keyword}** 工作台

当前任务：**${data.count.total} 项**${data.count.urgent > 0 ? ` · **${data.count.urgent} 个紧急**` : ''}

**${keyword}** 包含以下业务分类：`, () => {
                    const panelHtml = `
                        <div class="category-panel">
                            <div class="cat-header">
                                <div class="cat-icon" style="background:${data.color}15;color:${data.color};">${data.icon}</div>
                                <div class="cat-title">${keyword}</div>
                            </div>
                            <div class="sub-list">
                                ${data.subcategories.map(sub => `
                                    <div class="sub-card" onclick="enterSubcategory('${keyword}', '${sub.name}')">
                                        <div class="sub-icon" style="background:${sub.color}15;color:${sub.color};">${sub.icon}</div>
                                        <div class="sub-info">
                                            <div class="sub-name">${sub.name}</div>
                                            <div class="sub-desc">${sub.desc}</div>
                                        </div>
                                        <div class="sub-arrow">›</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>`;
                    const lastMsg = chat.lastElementChild;
                    if (lastMsg) lastMsg.querySelector('.ai-content').insertAdjacentHTML('beforeend', panelHtml);
                    setTimeout(() => { data.tasks.forEach((task, idx) => { setTimeout(() => addTaskCard(task, data.color), idx * 300); }); }, 400);
                    chat.scrollTop = chat.scrollHeight;
                    updateSuggestions([...data.subcategories.slice(0, 3).map(s => s.name), '查看全部任务', '返回导航']);
                });
            }, 500);
        }

        function addTaskCard(task, color) {
            const card = document.createElement('div');
            card.className = `task-card ${task.status}`;
            card.innerHTML = `
                <div class="task-header">
                    <div class="task-avatar" style="background:${color}15;color:${color};">${task.name[0]}</div>
                    <div>
                        <div class="task-title">${task.name}</div>
                        <div class="task-subtitle">${task.desc} ${task.status === 'urgent' ? '· 🔴 紧急' : ''}</div>
                    </div>
                </div>
                <div class="task-actions">
                    <button class="btn btn-primary" onclick="handleTaskAction('查看', '${task.name}')">查看详情</button>
                    <button class="btn btn-secondary" onclick="handleTaskAction('处理', '${task.name}')">${task.status === 'urgent' ? '立即处理' : '开始处理'}</button>
                </div>`;
            const lastMsg = chat.lastElementChild;
            if (lastMsg && lastMsg.classList.contains('message-ai')) lastMsg.querySelector('.ai-content').appendChild(card);
            chat.scrollTop = chat.scrollHeight;
        }

        function enterSubcategory(category, subcategory) {
            addUserMessage(`${category} - ${subcategory}`);
            setTimeout(() => {
                typeWriter(`进入 **${category} › ${subcategory}**

正在加载该分类下的任务和数据...`, () => {
                    updateSuggestions(['查看列表', '添加任务', `返回${category}`, '返回导航']);
                });
            }, 400);
        }

        function handleTaskAction(action, taskName) {
            addUserMessage(`${action} ${taskName}`);
            setTimeout(() => {
                if (taskName === '华泰资管') showTaskDetail(taskName);
                else {
                    typeWriter(`✓ 已打开 **${taskName}** 任务详情`);
                    updateSuggestions(['执行操作', '标记完成', '返回列表']);
                }
            }, 400);
        }

        function showTaskDetail(taskName) {
            setTimeout(() => {
                typeWriter(`📋 **华泰资管** 任务详情`, () => {
                    const detailHtml = `
                        <div class="task-card urgent">
                            <div class="task-header">
                                <div class="task-avatar" style="background:#ef444420;color:#ef4444;">华</div>
                                <div>
                                    <div class="task-title">华泰资管</div>
                                    <div class="task-subtitle">准入审核中 · 剩余2小时</div>
                                </div>
                            </div>
                            <div class="task-body">
                                <div style="margin-bottom:12px;"><span class="tag tag-urgent">🔴 即将超时</span></div>
                                ⚠️ <strong>紧急：资料补充即将超时</strong><br><br>
                                缺失材料：<br>
                                • 法人身份证复印件（正反面）<br>
