<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>机构经纪智能体</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #f5f5f7; --surface: #ffffff; --card: #ffffff;
            --border: rgba(0,0,0,0.08); --text: #1d1d1f;
            --text-secondary: rgba(0,0,0,0.5); --primary: #007aff;
            --success: #34c759; --warning: #ff9500; --danger: #ff3b30;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        .app { height: 100vh; display: flex; flex-direction: column; }
        .top-bar { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--surface); }
        .brand { font-size: 16px; font-weight: 600; }
        .status { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-secondary); }
        .status-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 92%; animation: fadeIn 0.3s ease; }
        .message-user { align-self: flex-end; background: var(--primary); color: white; padding: 12px 16px; border-radius: 20px 20px 4px 20px; font-size: 15px; }
        .message-ai { display: flex; gap: 10px; }
        .ai-icon { width: 28px; height: 28px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .ai-content { flex: 1; font-size: 15px; line-height: 1.7; }
        .nav-center { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin: 8px 0; }
        .biz-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .biz-entry { background: rgba(0,0,0,0.02); border-radius: 16px; padding: 16px; cursor: pointer; transition: all 0.25s; border: 2px solid transparent; }
        .biz-entry:hover { background: rgba(0,0,0,0.04); transform: translateY(-2px); }
        .entry-keyword { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
        .entry-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
        .case-box { margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.02); border-radius: 8px; font-size: 12px; }
        .case-title { font-weight: 500; margin-bottom: 4px; }
        .case-desc { color: var(--text-secondary); }
        .quick-prompts { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
        .quick-title { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
        .prompt-tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .prompt-tag { padding: 8px 14px; background: rgba(0,122,255,0.08); border: 1px solid rgba(0,122,255,0.2); border-radius: 16px; font-size: 13px; color: var(--primary); cursor: pointer; }
        .task-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin: 10px 0; }
        .task-card.urgent { border-left: 4px solid var(--danger); }
        .task-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
        .task-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; }
        .task-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; border: none; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-secondary { background: rgba(0,0,0,0.06); color: var(--text); }
        .btn-success { background: var(--success); color: #fff; }
        .tag-urgent { display: inline-block; padding: 2px 8px; background: rgba(255,59,48,0.1); color: var(--danger); border-radius: 4px; font-size: 11px; margin-bottom: 8px; }
        .input-area { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px 24px; background: linear-gradient(180deg, transparent 0%, var(--bg) 30%); }
        .suggestions { display: flex; gap: 8px; overflow-x: auto; padding: 8px 0; }
        .suggestions::-webkit-scrollbar { display: none; }
        .chip { padding: 6px 12px; background: rgba(0,0,0,0.05); border: 1px solid var(--border); border-radius: 14px; font-size: 13px; white-space: nowrap; cursor: pointer; }
        .input-box { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 4px 4px 4px 16px; display: flex; align-items: center; gap: 8px; }
        .input-field { flex: 1; background: transparent; border: none; color: var(--text); font-size: 15px; outline: none; padding: 10px 0; }
        .input-btn { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; background: var(--primary); color: #fff; }
        .cursor { display: inline-block; width: 8px; height: 18px; background: var(--primary); margin-left: 2px; animation: blink 1s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .sub-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin: 16px 0; }
        .sub-item { padding: 12px; background: rgba(0,0,0,0.02); border-radius: 12px; cursor: pointer; }
        .sub-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
        .sub-desc { font-size: 11px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="app">
        <div class="top-bar">
            <div class="brand">🦁 机构经纪智能体</div>
            <div class="status"><div class="status-dot"></div><span>AI运行中</span></div>
        </div>
        <div class="chat" id="chat"></div>
        <div class="input-area">
            <div class="suggestions" id="suggestions"></div>
            <div class="input-box">
                <input type="text" class="input-field" id="input" placeholder="输入关键词或点击上方入口..." onkeypress="if(event.key==='Enter')send()">
                <div class="input-btn" onclick="send()">↑</div>
            </div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const suggestions = document.getElementById('suggestions');

        const businessNav = {
            '引入客户': {
                color: '#3b82f6', desc: '线索收集、资质评估、分配跟进',
                count: { total: 4, urgent: 1 },
                cases: [
                    { title: '华泰资管 - 资料待补充', desc: '准入审核中，2小时截止', urgent: true },
                    { title: '华夏理财 - AI评估完成', desc: '92分高价值客户，建议跟进', urgent: false }
                ]
            },
            '账户开立': {
                color: '#8b5cf6', desc: '准入审核、协议签署、权限配置',
                count: { total: 3, urgent: 0 },
                cases: [
                    { title: '嘉实基金 - 资料审核中', desc: '授权书待补充，预计今日完成', urgent: false },
                    { title: '南方基金 - 协议待签署', desc: '电子协议已发送，等待回复', urgent: false }
                ]
            },
            '交易服务': {
                color: '#10b981', desc: '系统配置、订单执行、成交分析',
                count: { total: 5, urgent: 0 },
                cases: [
                    { title: '广发基金 - 系统配置申请', desc: 'TWAP算法参数，5000万/日规模', urgent: false },
                    { title: '博时基金 - 成交异常提醒', desc: '昨日大单成交滑点超阈值', urgent: false }
                ]
            },
            '客户服务': {
                color: '#f59e0b', desc: '咨询响应、舆情监控、风险预警',
                count: { total: 6, urgent: 1 },
                cases: [
                    { title: '中银基金 - 舆情预警', desc: '负面报道，需主动沟通', urgent: true },
                    { title: '鹏华基金 - 定期回访', desc: '30天未回访，建议今日联系', urgent: false }
                ]
            }
        };

        window.onload = () => {
            setTimeout(() => {
                typeWriter('📋 今日重点工作：', () => {
                    addBusinessNavCenter();
                    updateSuggestions(['🔍 潜客挖掘', '⚡ 快速开户', '📋 申请事项', '📊 业绩看板']);
                });
            }, 200);
        };

        function typeWriter(text, callback) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message message-ai';
            wrapper.innerHTML = '<div class="ai-icon">🦁</div><div class="ai-content"><span id="typing-text"></span><span class="cursor"></span></div>';
            chat.appendChild(wrapper);
            chat.scrollTop = chat.scrollHeight;
            
            const span = wrapper.querySelector('#typing-text');
            let i = 0;
            const type = () => {
                if (i < text.length) {
                    span.textContent += text.charAt(i);
                    i++;
                    chat.scrollTop = chat.scrollHeight;
                    setTimeout(type, 15);
                } else {
                    wrapper.querySelector('.cursor').remove();
                    if (callback) callback();
                }
            };
            type();
        }

        function addBusinessNavCenter() {
            let navHtml = '<div class="nav-center"><div class="biz-grid">';
            
            for (const [keyword, data] of Object.entries(businessNav)) {
                const firstCase = data.cases[0];
                const secondCase = data.cases[1];
                
                navHtml += '<div class="biz-entry" onclick="enterCategory(\'' + keyword + '\')" style="border-color:transparent;" onmouseover="this.style.borderColor=\'' + data.color + '40\'" onmouseout="this.style.borderColor=\'transparent\'">';
                navHtml += '<div class="entry-keyword">' + keyword + '</div>';
                navHtml += '<div class="entry-desc">' + data.desc + '</div>';
                navHtml += '<div style="margin-top:10px;font-size:12px;color:var(--text-secondary);">';
                navHtml += (data.count.urgent > 0 ? '<span style="color:var(--danger);font-weight:500;">🔴 ' + data.count.urgent + ' 紧急</span> · ' : '');
                navHtml += '<span style="font-weight:500;">' + data.count.total + ' 项待办</span></div>';
                
                if (firstCase) {
                    navHtml += '<div class="case-box" style="' + (firstCase.urgent ? 'border-left:2px solid var(--danger);' : '') + '">';
                    navHtml += '<div class="case-title" style="color:' + (firstCase.urgent ? 'var(--danger)' : 'var(--text)') + ';">' + firstCase.title + '</div>';
                    navHtml += '<div class="case-desc">' + firstCase.desc + '</div></div>';
                }
                if (secondCase) {
                    navHtml += '<div class="case-box" style="' + (secondCase.urgent ? 'border-left:2px solid var(--danger);' : '') + '">';
                    navHtml += '<div class="case-title" style="color:' + (secondCase.urgent ? 'var(--danger)' : 'var(--text)') + ';">' + secondCase.title + '</div>';
                    navHtml += '<div class="case-desc">' + secondCase.desc + '</div></div>';
                }
                navHtml += '</div>';
            }
            
            navHtml += '</div><div class="quick-prompts"><div class="quick-title">💡 常用提示词</div><div class="prompt-tags">';
            navHtml += '<div class="prompt-tag" onclick="send(\'今日工作台\')">📊 今日工作台</div>';
            navHtml += '<div class="prompt-tag" onclick="send(\'🔴 紧急事项\')">🔴 紧急事项</div>';
            navHtml += '<div class="prompt-tag" onclick="send(\'🔍 潜客挖掘\')">🔍 潜客挖掘</div>';
            navHtml += '</div></div></div>';
            
            const lastMsg = chat.lastElementChild;
            if (lastMsg) lastMsg.querySelector('.ai-content').insertAdjacentHTML('beforeend', navHtml);
            chat.scrollTop = chat.scrollHeight;
        }

        function enterCategory(keyword) { send(keyword); }

        function send(text) {
            const msg = text || input.value.trim();
            if (!msg) return;
            addUserMessage(msg);
            input.value = '';
            processResponse(msg);
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'message message-user';
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function processResponse(userMsg) {
            const msg = userMsg.trim();
            
            if (businessNav[msg]) {
                showCategoryInterface(msg);
            } else if (msg.includes('潜客挖掘')) {
                showNewLeadEntry();
            } else if (msg.includes('快速开户')) {
                showQuickOpenAccount();
            } else if (msg.includes('申请事项')) {
                showApplyMenu();
            } else if (msg.includes('业绩看板')) {
                showPerformanceDashboard();
            } else if (msg.includes('紧急')) {
                showUrgentTasks();
            } else if (msg.includes('今日') || msg.includes('工作台')) {
                showTodayOverview();
            } else {
                setTimeout(() => {
                    typeWriter('收到。请从上方选择今日重点工作，或使用底部快捷入口：', () => {
                        addBusinessNavCenter();
                    });
                    updateSuggestions(['🔍 潜客挖掘', '⚡ 快速开户', '📋 申请事项', '📊 业绩看板']);
                }, 500);
            }
        }

        function showCategoryInterface(keyword) {
            const data = businessNav[keyword];
            const welcomeMsgs = {
                '引入客户': '👤 **引入客户** 工作台\n\n📊 今日概览：' + data.count.total + ' 项任务' + (data.count.urgent > 0 ? ' · 🔴 ' + data.count.urgent + ' 个紧急' : '') + '\n\n🎯 **重点待办**：',
                '账户开立': '📝 **账户开立** 工作台\n\n📊 今日概览：' + data.count.total + ' 项任务 · 预计今日完成 2 单\n\n🎯 **审核进度**：',
                '交易服务': '💰 **交易服务** 工作台\n\n📊 今日概览：' + data.count.total + ' 项服务请求\n\n🎯 **服务动态**：',
                '客户服务': '🎧 **客户服务** 工作台\n\n📊 今日概览：' + data.count.total + ' 项任务' + (data.count.urgent > 0 ? ' · 🔴 ' + data.count.urgent + ' 个预警' : '') + '\n\n🎯 **服务提醒**：'
            };
            
            setTimeout(() => {
                typeWriter(welcomeMsgs[keyword], () => {
                    // 显示案例卡片
                    data.cases.forEach((caseItem, idx) => {
                        setTimeout(() => addCaseCard(caseItem, data.color), idx * 200);
                    });
                    updateSuggestions(['处理', '查看全部', '返回']);
                });
            }, 500);
        }

        function addCaseCard(caseItem, color) {
            let actionsHtml = '';
            if (caseItem.title.includes('华泰')) {
                actionsHtml = '<button class="btn btn-success" onclick="completeAction(\'一键催办\')">✓ 一键催办</button><button class="btn btn-secondary" onclick="completeAction(\'查看资料清单\')">资料清单</button>';
            } else if (caseItem.title.includes('华夏')) {
                actionsHtml = '<button class="btn btn-primary" onclick="completeAction(\'开始评估\')">开始评估</button><button class="btn btn-secondary" onclick="completeAction(\'分配给张经理\')">分配给张经理</button>';
            } else if (caseItem.title.includes('中银') || caseItem.title.includes('舆情')) {
                actionsHtml = '<button class="btn btn-primary" onclick="completeAction(\'生成简报\')">生成简报</button><button class="btn btn-secondary" onclick="completeAction(\'联系客户\')">联系客户</button>';
            } else {
                actionsHtml = '<button class="btn btn-primary" onclick="completeAction(\'查看详情\')">查看详情</button><button class="btn btn-secondary" onclick="completeAction(\'开始处理\')">开始处理</button>';
            }
            
            const cardHtml = '<div class="task-card ' + (caseItem.urgent ? 'urgent' : '') + '" style="border-left:4px solid ' + (caseItem.urgent ? 'var(--danger)' : color) + '">' +
                '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">' +
                '<div><div class="task-title">' + caseItem.title + '</div><div class="task-desc">' + caseItem.desc + '</div></div>' +
                (caseItem.urgent ? '<span class="tag-urgent">紧急</span>' : '') +
                '</div><div class="task-actions">' + actionsHtml + '</div></div>';
            
            const lastMsg = chat.lastElementChild;
            if (lastMsg) lastMsg.querySelector('.ai-content').insertAdjacentHTML('beforeend', cardHtml);
            chat.scrollTop = chat.scrollHeight;
        }

        function completeAction(action) {
            addUserMessage(action);
            setTimeout(() => {
                if (action === '一键催办') {
                    typeWriter('✓ **催办已发送**\n\n📱 短信+邮件已发送至：王经理\n⏱️ 预计10分钟内送达\n🔔 我会在对方查看后提醒你');
                } else {
                    typeWriter('✓ **' + action + '** 已完成');
                }
                updateSuggestions(['查看其他任务', '返回工作台']);
            }, 500);
        }

        function showNewLeadEntry() {
            setTimeout(() => {
                typeWriter('🔍 **潜客挖掘** - 新客户线索发现\n\nAI扫描到以下潜在线索：', () => {
                    const html = '<div class="task-card"><div class="task-title">易方达投资（邮件）</div><div class="task-desc">张总咨询TWAP算法，预计5000万/月</div><div class="task-actions"><button class="btn btn-primary" onclick="completeAction(\'录入线索\')">录入线索</button><button class="btn btn-secondary" onclick="completeAction(\'发送资料\')">发送资料</button></div></div>' +
                        '<div class="task-card"><div class="task-title">国泰基金（活动）</div><div class="task-desc">李总对量化交易感兴趣，名片已扫描</div><div class="task-actions"><button class="btn btn-primary" onclick="completeAction(\'录入线索\')">录入线索</button><button class="btn btn-secondary" onclick="completeAction(\'AI评估\')">AI评估</button></div></div>';
                    const lastMsg = chat.lastElementChild;
                    if (lastMsg) lastMsg.querySelector('.ai-content').insertAdjacentHTML('beforeend', html);
                    updateSuggestions(['录入易方达线索', '录入国泰线索']);
                });
            }, 500);
        }

        function showQuickOpenAccount() {
            setTimeout(() => {
                typeWriter('⚡ **快速开户** - 新客户准入通道\n\n请选择开户类型：', () => {
                    const html = '<div class="sub-grid"><div class="sub-item" onclick="send(\'公募基金开户\')"><div class="sub-name" style="color:#3b82f6;">公募基金</div><div class="sub-desc">常规机构客户，标准流程</div></div><div class="sub-item" onclick="send(\'私募基金开户\')"><div class="sub-name" style="color:#8b5cf6;">私募基金</div><div class="sub-desc">需额外尽调，3-5个工作日</div></div></div>';
                    const lastMsg = chat.lastElementChild;
                    if (lastMsg) lastMsg.querySelector('.ai-content').insertAdjacentHTML('beforeend', html);
                    updateSuggestions(['公募基金开户', '私募基金开户']);
                });
            }, 500);
        }

        function showApplyMenu() {
            setTimeout(() => {
                typeWriter('📋 **申请事项** - 业务申请中心\n\n请选择申请类型：', () => {
                    const html = '<div class="sub-grid"><div class="sub-item" onclick="send(\'申请算法交易\')"><div class="sub-name" style="color:#3b82f6;">算法交易</div><div class="sub-desc">TWAP/VWAP等算法服务</div></div><div class="sub-item" onclick="send(\'申请两融业务\')"><div class="sub-name" style="color:#8b5cf6;">融资融券</div><div class="sub-desc">开通融资融券权限</div></div></div>';
                    const lastMsg = chat.lastElementChild;
                    if (lastMsg) lastMsg.querySelector('.ai-content').insertAdjacentHTML('beforeend', html);
                    updateSuggestions(['申请算法交易', '申请两融业务']);
                });
            }, 500);
        }

        function showPerformanceDashboard() {
            setTimeout(() => {
                typeWriter('📊 **业绩看板** - 今日数据概览\n\n📈 **关键指标**：', () => {
                    const html = '<div class="sub-grid"><div class="sub-item"><div style="font-size:20px;font-weight:700;color:#10b981;">2.3亿</div><div class="sub-desc">今日成交额</div></div><div class="sub-item"><div style="font-size:20px;font-weight:700;color:#3b82f6;">18</div><div class="sub-desc">在办任务</div></div><div class="sub-item"><div style="font-size:20px;font-weight:700;color:#8b5cf6;">4</div><div class="sub-desc">本月新客</div></div><div class="sub-item"><div style="font-size:20px;font-weight:700;color:#f59e0b;">96%</div><div class="sub-desc">客户满意度</div></div></div><div class="task-card" style="margin-top:10px;"><div class="task-desc">💡 AI洞察：今日成交额超目标，建议重点跟进华泰资管开户</div><div class="task-actions"><button class="btn btn-primary" onclick="send(\'查看华泰资管\')">查看详情</button></div></div>';
                    const lastMsg = chat.lastElementChild;
                    if (lastMsg) lastMsg.querySelector('.ai-content').insertAdjacentHTML('beforeend', html);
                    updateSuggestions(['查看详细数据', '导出日报']);
                });
            }, 500);
        }

        function showUrgentTasks() {
            setTimeout(() => {
                typeWriter('🔴 **紧急事项** - 需立即处理\n\n共 **2 项** 紧急任务：', () => {
                    const html = '<div class="task-card urgent"><div class="task-title">华泰资管</div><div class="task-desc">引入客户 · 资料待补充 · 剩余2小时</div><div class="task-actions"><button class="btn btn-success" onclick="completeAction(\'一键催办\')">✓ 一键催办</button><button class="btn btn-secondary" onclick="completeAction(\'电话提醒\')">电话提醒</button></div></div><div class="task-card urgent"><div class="task-title">中银基金</div><div class="task-desc">客户服务 · 舆情预警 · 2小时前</div><div class="task-actions"><button class="btn btn-primary" onclick="completeAction(\'生成简报\')">生成简报</button><button class="btn btn-secondary" onclick="completeAction(\'联系客户\')">联系客户</button></div></div>';
                    const lastMsg = chat.lastElementChild;
                    if (lastMsg) lastMsg.querySelector('.ai-content').insertAdjacentHTML('beforeend', html);
                    updateSuggestions(['一键催办华泰', '生成中银简报']);
                });
            }, 500);
        }

        function showTodayOverview() {
            setTimeout(() => {
                typeWriter('📊 **今日任务概览**\n\n共 **18 项任务** · **2 个紧急**\n\n各业务线分布：', () => {
                    for (const [keyword, data] of Object.entries(businessNav)) {
                        const html = '<div class="task-card" style="cursor:pointer;" onclick="enterCategory(\'' + keyword + '\')"><div style="display:flex;justify-content:space-between;align-items:center;"><div><div style="font-weight:600;">' + keyword + '</div><div class="task-desc">' + data.desc + '</div></div><div style="text-align:right;"><div style="font-size:18px;font-weight:600;">' + data.count.total + '</div><div style="font-size:11px;color:var(--text-secondary);">' + (data.count.urgent > 0 ? '🔴 ' + data.count.urgent + '紧急' : '项任务') + '</div></div></div></div>';
                        const lastMsg = chat.lastElementChild;
                        if (lastMsg) lastMsg.querySelector('.ai-content').insertAdjacentHTML('beforeend', html);
                    }
                    updateSuggestions(['🔍 潜客挖掘', '⚡ 快速开户', '📋 申请事项', '📊 业绩看板']);
                });
            }, 500);
        }

        function updateSuggestions(list) {
            suggestions.innerHTML = list.map(s => '<div class="chip" onclick="send(\'' + s + '\')">' + s + '</div>').join('');
        }
    </script>
</body>
</html>
